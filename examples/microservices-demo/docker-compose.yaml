# =============================================================================
# OllyStack - Microservices Demo
# =============================================================================
# A complete demo stack with 3 sample microservices instrumented with
# OpenTelemetry, plus the full observability backend (Collector, Jaeger,
# Prometheus, Grafana).
#
# Usage:
#   docker compose up -d          # Start everything
#   docker compose logs -f        # Follow all logs
#   docker compose down -v        # Stop and clean up
#
# Endpoints:
#   Frontend App:        http://localhost:8080
#   API Service:         http://localhost:8081
#   Jaeger UI:           http://localhost:16686
#   Prometheus:          http://localhost:9090
#   Grafana:             http://localhost:3000
#   OTel Collector:      grpc://localhost:4317, http://localhost:4318
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Sample Microservices
  # ---------------------------------------------------------------------------

  # Frontend service - HTTP server that calls the API service
  frontend:
    image: python:3.11-slim
    container_name: demo-frontend
    working_dir: /app
    command: >
      bash -c "
        pip install flask requests opentelemetry-api opentelemetry-sdk \
          opentelemetry-exporter-otlp opentelemetry-instrumentation-flask \
          opentelemetry-instrumentation-requests 2>/dev/null &&
        python frontend.py
      "
    volumes:
      - ./services/frontend.py:/app/frontend.py:ro
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=frontend
      - SERVICE_VERSION=1.0.0
      - API_ENDPOINT=http://api:8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=frontend
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,deployment.environment=development
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    networks:
      - demo-net
    depends_on:
      - api
      - otel-collector

  # API service - HTTP server that processes requests and queues work
  api:
    image: python:3.11-slim
    container_name: demo-api
    working_dir: /app
    command: >
      bash -c "
        pip install flask requests opentelemetry-api opentelemetry-sdk \
          opentelemetry-exporter-otlp opentelemetry-instrumentation-flask \
          opentelemetry-instrumentation-requests redis 2>/dev/null &&
        python api.py
      "
    volumes:
      - ./services/api.py:/app/api.py:ro
    ports:
      - "8081:8081"
    environment:
      - SERVICE_NAME=api
      - SERVICE_VERSION=1.0.0
      - WORKER_ENDPOINT=http://worker:8082
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=api
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,deployment.environment=development
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    networks:
      - demo-net
    depends_on:
      - worker
      - otel-collector

  # Worker service - Background processor
  worker:
    image: python:3.11-slim
    container_name: demo-worker
    working_dir: /app
    command: >
      bash -c "
        pip install flask opentelemetry-api opentelemetry-sdk \
          opentelemetry-exporter-otlp opentelemetry-instrumentation-flask 2>/dev/null &&
        python worker.py
      "
    volumes:
      - ./services/worker.py:/app/worker.py:ro
    ports:
      - "8082:8082"
    environment:
      - SERVICE_NAME=worker
      - SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=worker
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=demo,deployment.environment=development
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    networks:
      - demo-net
    depends_on:
      - otel-collector

  # ---------------------------------------------------------------------------
  # Observability Stack
  # ---------------------------------------------------------------------------

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: demo-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Collector metrics
      - "8889:8889"     # Prometheus exporter
      - "13133:13133"   # Health check
    networks:
      - demo-net
    depends_on:
      - jaeger

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: demo-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC
    networks:
      - demo-net

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: demo-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - demo-net

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: demo-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - demo-net
    depends_on:
      - prometheus
      - jaeger

# =============================================================================
# Networks
# =============================================================================
networks:
  demo-net:
    driver: bridge
    name: ollystack-demo-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
