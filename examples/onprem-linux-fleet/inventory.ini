# =============================================================================
# Ansible Inventory - On-Premises Linux Fleet
# =============================================================================
# Define your servers in the appropriate groups below.
# Agents run on all application/workload servers.
# Gateway runs on one or more dedicated collector servers.
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yaml
#   ansible all -i inventory.ini -m ping
# =============================================================================

# -----------------------------------------------------------------------------
# OTel Collector Agents
# -----------------------------------------------------------------------------
# Agents run as DaemonSet-equivalent on every application server.
# They collect host metrics, logs, and receive OTLP from local apps.

[agents]
# Web servers
web-01.example.com    ansible_host=192.168.1.10
web-02.example.com    ansible_host=192.168.1.11
web-03.example.com    ansible_host=192.168.1.12

# API servers
api-01.example.com    ansible_host=192.168.1.20
api-02.example.com    ansible_host=192.168.1.21

# Worker/background servers
worker-01.example.com ansible_host=192.168.1.30
worker-02.example.com ansible_host=192.168.1.31
worker-03.example.com ansible_host=192.168.1.32

# Database servers (metrics only, no app OTLP)
db-01.example.com     ansible_host=192.168.1.40  otel_receive_otlp=false
db-02.example.com     ansible_host=192.168.1.41  otel_receive_otlp=false

# -----------------------------------------------------------------------------
# OTel Collector Gateway
# -----------------------------------------------------------------------------
# Gateway receives telemetry from all agents, processes it, and exports
# to the backends. Run 1-2 for HA.

[gateway]
otel-gw-01.example.com  ansible_host=192.168.1.100
otel-gw-02.example.com  ansible_host=192.168.1.101

# -----------------------------------------------------------------------------
# Convenience Groups
# -----------------------------------------------------------------------------

[web_servers]
web-01.example.com
web-02.example.com
web-03.example.com

[api_servers]
api-01.example.com
api-02.example.com

[worker_servers]
worker-01.example.com
worker-02.example.com
worker-03.example.com

[db_servers]
db-01.example.com
db-02.example.com

# -----------------------------------------------------------------------------
# Group Variables - Agents
# -----------------------------------------------------------------------------
[agents:vars]
# OTel Collector version to install
otel_version=0.95.0

# Architecture (amd64, arm64)
otel_arch=amd64

# Agent -> Gateway endpoint
gateway_endpoint=otel-gw-01.example.com:4317

# Agent configuration
otel_config_template=agent
otel_receive_otlp=true
otel_collect_hostmetrics=true
otel_collect_journald=true

# Systemd service settings
otel_service_user=otelcol
otel_service_group=otelcol
otel_memory_limit_mib=512
otel_config_dir=/etc/otelcol-contrib
otel_log_level=info

# SSH settings
ansible_user=deploy
ansible_become=true
ansible_become_method=sudo

# -----------------------------------------------------------------------------
# Group Variables - Gateway
# -----------------------------------------------------------------------------
[gateway:vars]
# OTel Collector version
otel_version=0.95.0
otel_arch=amd64

# Gateway configuration
otel_config_template=gateway
otel_memory_limit_mib=2048
otel_config_dir=/etc/otelcol-contrib
otel_log_level=info

# Backend endpoints (configure these for your environment)
backend_jaeger_endpoint=jaeger.example.com:4317
backend_prometheus_endpoint=http://prometheus.example.com:9090/api/v1/write
backend_loki_endpoint=http://loki.example.com:3100/loki/api/v1/push

# Systemd service settings
otel_service_user=otelcol
otel_service_group=otelcol

# SSH settings
ansible_user=deploy
ansible_become=true
ansible_become_method=sudo

# -----------------------------------------------------------------------------
# All hosts
# -----------------------------------------------------------------------------
[all:vars]
# Common variables for all hosts
ansible_python_interpreter=/usr/bin/python3
