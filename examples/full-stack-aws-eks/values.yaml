# =============================================================================
# Helm Values - Full Stack AWS EKS Deployment
# =============================================================================
# Combined values for deploying OTel Collector on EKS with AWS-native backends.
# Use with: helm install otel open-telemetry/opentelemetry-collector -f values.yaml
# =============================================================================

# -- Deployment mode: "daemonset" for agent, "deployment" for gateway
mode: daemonset

# -- Namespace configuration
namespaceOverride: observability

# -- Number of replicas (only for deployment mode)
replicaCount: 2

# =============================================================================
# Image Configuration
# =============================================================================
image:
  repository: otel/opentelemetry-collector-contrib
  tag: latest
  pullPolicy: IfNotPresent

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  name: otel-collector
  annotations:
    eks.amazonaws.com/role-arn: "${OTEL_COLLECTOR_ROLE_ARN}"

# =============================================================================
# Cluster Role (for k8s metadata enrichment)
# =============================================================================
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes", "nodes/stats", "endpoints"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs", "cronjobs"]
      verbs: ["get", "list", "watch"]

# =============================================================================
# Ports
# =============================================================================
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  health:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# =============================================================================
# Resource Limits
# =============================================================================
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# =============================================================================
# Pod Configuration
# =============================================================================
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"

tolerations:
  - operator: Exists
    effect: NoSchedule

nodeSelector: {}

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: eks.amazonaws.com/compute-type
              operator: NotIn
              values:
                - fargate

# =============================================================================
# Environment Variables
# =============================================================================
extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: K8S_POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: K8S_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: AWS_REGION
    value: us-west-2

# =============================================================================
# Volume Mounts (for host metrics on agent)
# =============================================================================
extraVolumes:
  - name: hostfs
    hostPath:
      path: /
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: hostfs
    mountPath: /hostfs
    readOnly: true
    mountPropagation: HostToContainer
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

# =============================================================================
# Collector Configuration
# =============================================================================
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Kubernetes cluster metrics
    k8s_cluster:
      collection_interval: 30s
      node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        - PIDPressure

    # Host metrics from nodes
    hostmetrics:
      root_path: /hostfs
      collection_interval: 30s
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        disk: {}
        filesystem: {}
        load: {}
        network: {}

    # Kubernetes pod logs
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/*/otc-container/*.log
      start_at: end
      include_file_path: true
      include_file_name: false
      operators:
        - type: router
          id: get-format
          routes:
            - output: parser-docker
              expr: 'body matches "^\\{"'
            - output: parser-crio
              expr: 'body matches "^[^ Z]+ "'
            - output: parser-containerd
              expr: 'body matches "^[^ Z]+Z"'
        - type: json_parser
          id: parser-docker
          output: extract-metadata
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        - type: regex_parser
          id: parser-crio
          regex: "^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract-metadata
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%L%j"
        - type: regex_parser
          id: parser-containerd
          regex: "^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract-metadata
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        - type: move
          id: extract-metadata
          from: attributes.log
          to: body

  processors:
    batch:
      send_batch_size: 1024
      timeout: 5s

    memory_limiter:
      check_interval: 5s
      limit_mib: 800
      spike_limit_mib: 200

    k8sattributes:
      auth_type: serviceAccount
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.job.name
          - k8s.cronjob.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.start_time
        labels:
          - tag_name: app.label.team
            key: team
            from: pod
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    resourcedetection:
      detectors: [env, eks, ec2]
      timeout: 5s
      override: false
      eks:
        resource_attributes:
          k8s.cluster.name:
            enabled: true
      ec2:
        resource_attributes:
          host.id:
            enabled: true
          cloud.account.id:
            enabled: true
          cloud.availability_zone:
            enabled: true
          cloud.region:
            enabled: true

  exporters:
    # AWS X-Ray for traces
    awsxray:
      region: us-west-2
      index_all_attributes: true

    # AWS CloudWatch for logs
    awscloudwatchlogs:
      region: us-west-2
      log_group_name: "/ollystack/otel"
      log_stream_name: "eks-logs"
      log_retention: 30

    # Amazon Managed Prometheus for metrics
    prometheusremotewrite:
      endpoint: "https://aps-workspaces.us-west-2.amazonaws.com/workspaces/${AMP_WORKSPACE_ID}/api/v1/remote_write"
      auth:
        authenticator: sigv4auth
      resource_to_telemetry_conversion:
        enabled: true

    # Debug exporter for troubleshooting
    debug:
      verbosity: basic

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    sigv4auth:
      region: us-west-2
      service: aps

  service:
    extensions: [health_check, sigv4auth]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [awsxray, debug]
      metrics:
        receivers: [otlp, hostmetrics, k8s_cluster]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [prometheusremotewrite, debug]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [awscloudwatchlogs, debug]
    telemetry:
      logs:
        level: info
      metrics:
        level: detailed
        address: 0.0.0.0:8888
