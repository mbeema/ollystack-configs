# Elastic APM Exporter Configuration
# Sends traces, metrics, and logs to Elastic APM Server via OTLP
#
# Required environment variables:
#   ELASTIC_APM_ENDPOINT       - APM Server OTLP endpoint URL
#   ELASTIC_APM_SECRET_TOKEN   - APM Server secret token or API key

exporters:
  otlphttp/elastic:
    endpoint: ${ELASTIC_APM_ENDPOINT}
    headers:
      Authorization: "Bearer ${ELASTIC_APM_SECRET_TOKEN}"
    tls:
      insecure: false
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
    timeout: 30s

service:
  pipelines:
    traces:
      exporters: [otlphttp/elastic]
    metrics:
      exporters: [otlphttp/elastic]
    logs:
      exporters: [otlphttp/elastic]
