# Azure Monitor Exporter Configuration
# Sends traces, metrics, and logs to Azure Monitor / Application Insights
#
# Required environment variables:
#   AZURE_MONITOR_CONNECTION_STRING  - Application Insights connection string
#
# Note: Requires the OpenTelemetry Collector Contrib distribution

exporters:
  azuremonitor:
    connection_string: ${AZURE_MONITOR_CONNECTION_STRING}
    maxbatchsize: 100
    maxbatchinterval: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

service:
  pipelines:
    traces:
      exporters: [azuremonitor]
    metrics:
      exporters: [azuremonitor]
    logs:
      exporters: [azuremonitor]
