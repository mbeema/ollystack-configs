apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ollystack-collector-alerts
  labels:
    app: ollystack
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: ollystack-collector
      rules:
        - alert: CollectorHighMemory
          expr: otelcol_process_memory_rss{job="otel-collector"} / on(instance) otelcol_process_runtime_total_sys_memory_bytes{job="otel-collector"} > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "OTel Collector memory usage above 80%"
            description: "Collector {{ $labels.instance }} memory usage is {{ $value | humanizePercentage }}. Consider increasing memory limits or scaling horizontally."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/collector-high-memory.md"

        - alert: CollectorExporterFailures
          expr: rate(otelcol_exporter_send_failed_spans{job="otel-collector"}[5m]) + rate(otelcol_exporter_send_failed_metric_points{job="otel-collector"}[5m]) + rate(otelcol_exporter_send_failed_log_records{job="otel-collector"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "OTel Collector exporter send failures"
            description: "Collector {{ $labels.instance }} exporter {{ $labels.exporter }} is failing to send data. Check backend connectivity and authentication."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/collector-dropping-data.md"

        - alert: CollectorDroppingData
          expr: otelcol_exporter_queue_size{job="otel-collector"} >= otelcol_exporter_queue_capacity{job="otel-collector"}
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "OTel Collector exporter queue full - dropping data"
            description: "Collector {{ $labels.instance }} exporter {{ $labels.exporter }} queue is full. Data is being dropped."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/collector-dropping-data.md"

        - alert: CollectorHighCPU
          expr: rate(otelcol_process_cpu_seconds{job="otel-collector"}[5m]) > 0.80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "OTel Collector sustained high CPU usage"
            description: "Collector {{ $labels.instance }} CPU usage is {{ $value | humanizePercentage }} for over 10 minutes."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/collector-high-cpu.md"

        - alert: CollectorReceiverRefused
          expr: rate(otelcol_receiver_refused_spans{job="otel-collector"}[5m]) > 0 or rate(otelcol_receiver_refused_metric_points{job="otel-collector"}[5m]) > 0 or rate(otelcol_receiver_refused_log_records{job="otel-collector"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "OTel Collector receiver refusing data"
            description: "Collector {{ $labels.instance }} receiver {{ $labels.receiver }} is refusing data due to back-pressure."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/collector-high-memory.md"

        - alert: CollectorExporterQueueNearFull
          expr: otelcol_exporter_queue_size{job="otel-collector"} / otelcol_exporter_queue_capacity{job="otel-collector"} > 0.75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "OTel Collector exporter queue above 75%"
            description: "Collector {{ $labels.instance }} exporter {{ $labels.exporter }} queue utilization is {{ $value | humanizePercentage }}. Consider scaling or increasing queue capacity."
            runbook_url: "https://github.com/mbeema/ollystack-configs/blob/main/docs/runbooks/scaling-collectors.md"
