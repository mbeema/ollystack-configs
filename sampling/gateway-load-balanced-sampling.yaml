# --- End Load Balancer Config ---


# #############################################################################
#
#   TIER 3: GATEWAY CONFIG
#
#   Deploy: 2+ instances behind the load balancer's consistent hash ring.
#           Use a Kubernetes headless Service or static host list so the
#           load balancer can discover individual instances.
#   Role:   receive trace-ID-routed spans from the load balancer, buffer
#           complete traces, apply tail sampling decisions, and export
#           sampled traces to the tracing backend.
#
#   IMPORTANT: Gateway instances are STATEFUL with respect to in-flight
#   traces. Scaling up/down will cause some traces to be split across
#   instances during the transition. Scale gradually and during low-traffic
#   windows when possible.
#
# #############################################################################

# --- Begin Gateway Config (save as: gateway-config.yaml) ---

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${GATEWAY_OTLP_GRPC_PORT:-4317}
      http:
        endpoint: 0.0.0.0:${GATEWAY_OTLP_HTTP_PORT:-4318}

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: ${GATEWAY_MEMORY_LIMIT_MIB:-4096}
    spike_limit_mib: ${GATEWAY_MEMORY_SPIKE_MIB:-512}

  # -------------------------------------------------------------------------
  # Tail sampling on the gateway: this is where the actual decisions happen.
  # Because the load balancer routes by trace ID, each gateway instance
  # receives ALL spans for the traces assigned to it, enabling correct
  # tail-sampling decisions.
  # -------------------------------------------------------------------------
  tail_sampling:
    # Wait for the trace to complete. Set this longer than your longest
    # expected trace duration.
    decision_wait: ${DECISION_WAIT:-30s}

    # Buffer size. Gateways typically handle a fraction of total traffic
    # (total / number of gateways), so size accordingly.
    num_traces: ${NUM_TRACES:-200000}
    expected_new_traces_per_sec: ${EXPECTED_TRACES_PER_SEC:-5000}

    policies:
      # Always keep errors
      - name: keep-errors
        type: status_code
        status_code:
          status_codes:
            - ERROR

      # Always keep slow traces
      - name: keep-slow-traces
        type: latency
        latency:
          threshold_ms: ${LATENCY_THRESHOLD_MS:-2000}

      # Probabilistic fallback for healthy traffic
      - name: probabilistic-sample
        type: probabilistic
        probabilistic:
          sampling_percentage: ${SAMPLING_RATE:-10}

  # Batch after sampling to optimize export efficiency.
  batch:
    send_batch_size: 2048
    send_batch_max_size: 4096
    timeout: 5s

exporters:
  # Export sampled traces to your tracing backend.
  otlp/backend:
    endpoint: ${BACKEND_ENDPOINT:-tempo:4317}
    tls:
      insecure: ${OTLP_INSECURE:-true}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 20
      queue_size: 10000

service:
  # Telemetry for the gateway collector itself.
  telemetry:
    logs:
      level: ${LOG_LEVEL:-info}
    metrics:
      address: 0.0.0.0:${GATEWAY_METRICS_PORT:-8888}

  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - tail_sampling
        - batch
      exporters:
        - otlp/backend

# --- End Gateway Config ---
