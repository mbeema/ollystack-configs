# =============================================================================
# Gateway Load-Balanced Tail Sampling: 3-Tier Architecture
# =============================================================================
#
# ARCHITECTURE OVERVIEW
# =====================
#
# The fundamental challenge with tail sampling is that ALL spans belonging
# to the same trace must be evaluated by the SAME collector instance.
# If spans for trace ABC arrive at different collectors, each collector
# only sees a partial trace and cannot make a correct sampling decision.
#
# Solution: a 3-tier topology with trace-ID-aware load balancing.
#
#   +----------+   +----------+   +----------+
#   |  Agent 1 |   |  Agent 2 |   |  Agent 3 |    TIER 1: Agents
#   | (no smpl)|   | (no smpl)|   | (no smpl)|    Deployed per-node/pod
#   +----+-----+   +----+-----+   +----+-----+    Collect and forward
#        |              |              |
#        v              v              v
#   +------------------------------------------+
#   |         Load Balancer Collector           |   TIER 2: Load Balancer
#   |    (routes by traceID -> gateway)         |   Routes all spans for a
#   |    loadbalancing exporter                 |   given trace to the same
#   |    routing_key: traceID                   |   gateway instance
#   +----+----------------+--------------------+
#        |                |
#        v                v
#   +----------+    +----------+
#   | Gateway 1|    | Gateway 2|                    TIER 3: Gateways
#   | (tail    |    | (tail    |                    Apply tail sampling with
#   |  sample) |    |  sample) |                    complete trace context
#   +----+-----+    +----+-----+
#        |               |
#        v               v
#   +------------------------------------------+
#   |           Tracing Backend                 |
#   |    (Jaeger / Tempo / X-Ray / etc.)        |
#   +------------------------------------------+
#
# This file contains THREE separate configs. Deploy each tier with its own
# config file extracted from the appropriate section below.
#
# =============================================================================


# #############################################################################
#
#   TIER 1: AGENT CONFIG
#
#   Deploy: one per node, VM, or Kubernetes pod (as a sidecar or DaemonSet).
#   Role:   receive telemetry from application SDKs and forward to the
#           load balancer layer. NO sampling here -- just collect and ship.
#
# #############################################################################

