# #############################################################################
#
#   TIER 2: LOAD BALANCER CONFIG
#
#   Deploy: 1-3 instances behind a standard L4 load balancer (or Kubernetes
#           Service). Stateless -- can be scaled horizontally.
#   Role:   receive traces from agents and route them to gateway instances
#           using consistent hashing on the trace ID. This ensures all spans
#           for a given trace land on the same gateway.
#
# #############################################################################

# --- Begin Load Balancer Config (save as: loadbalancer-config.yaml) ---

