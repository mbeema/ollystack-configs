# =============================================================================
# Tail Sampling: Attribute-Based
# =============================================================================
# Sampling decisions driven by span/resource attributes. This pattern is
# useful when different workloads have different observability requirements:
#
#   - High-priority traces are always kept (e.g., VIP customers, critical jobs)
#   - Per-service sampling rates reflect each service's volume and importance
#   - Synthetic/test traffic is dropped entirely to avoid polluting data
#
# Environment Variables:
#   HIGH_VOLUME_SERVICE_RATE  - Sampling % for high-volume services (default: 5)
#   DEFAULT_SERVICE_RATE      - Sampling % for unlisted services (default: 25)
#   EXPECTED_TRACES_PER_SEC   - Expected ingest rate for sizing
#
# Merge with your base collector config:
#   otelcol --config=base.yaml --config=tail-sampling-attribute-based.yaml
# =============================================================================

processors:
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: ${EXPECTED_TRACES_PER_SEC:-10000}

    policies:
      # =====================================================================
      # Policy 1: Drop synthetic/test traffic (evaluated first)
      # =====================================================================
      # Traces tagged with synthetic=true are test or health-check traffic
      # generated by monitoring tools, load balancers, or CI pipelines.
      # These should never reach your tracing backend.
      #
      # To use this, instrument your synthetic callers to set:
      #   span.setAttribute("synthetic", "true")
      # or use the resource attribute in the SDK config.
      #
      # This is an "invert" policy: the string_attribute policy normally
      # KEEPS matching traces, but wrapping it with "and" + "invert" logic
      # allows us to DROP them instead. We use a composite approach here:
      # the drop policy is listed first so synthetic traces are caught
      # before any other policy can accept them.
      - name: drop-synthetic-traffic
        type: and
        and:
          and_sub_policy:
            - name: synthetic-check
              type: string_attribute
              string_attribute:
                key: synthetic
                values:
                  - "true"
            - name: drop-decision
              type: probabilistic
              probabilistic:
                # 0% sampling = drop all matching traces
                sampling_percentage: 0

      # =====================================================================
      # Policy 2: Always sample high-priority traces (100%)
      # =====================================================================
      # Traces marked with priority=high are always kept regardless of
      # volume. Use this for:
      #   - VIP customer requests (tag at the API gateway)
      #   - Critical background jobs (tag in the job scheduler)
      #   - Incident-related traffic (tag via feature flag during debugging)
      #
      # Instrumentation example:
      #   span.setAttribute("priority", "high")
      - name: keep-high-priority
        type: string_attribute
        string_attribute:
          key: priority
          values:
            - "high"
          enabled_regex_matching: false

      # =====================================================================
      # Policy 3: Per-service sampling rates
      # =====================================================================
      # Different services have wildly different trace volumes. A frontend
      # BFF might generate 100 traces/sec while a batch processor generates
      # 50,000. Applying the same sampling rate to both either starves
      # the low-volume service of data or overwhelms the backend with
      # high-volume service traces.
      #
      # These "and" policies combine a service name filter with a
      # probabilistic sampler to achieve per-service rates.

      # -- High-volume services: aggressive sampling (5%) --
      # These services generate massive trace volumes. Keep just enough
      # for trend analysis and occasional debugging.
      - name: high-volume-services
        type: and
        and:
          and_sub_policy:
            - name: service-filter
              type: string_attribute
              string_attribute:
                key: service.name
                values:
                  - "api-gateway"
                  - "event-processor"
                  - "metrics-collector"
                enabled_regex_matching: false
            - name: rate
              type: probabilistic
              probabilistic:
                sampling_percentage: ${HIGH_VOLUME_SERVICE_RATE:-5}

      # -- Medium-volume services: moderate sampling (25%) --
      # Core business services with meaningful but manageable volume.
      - name: medium-volume-services
        type: and
        and:
          and_sub_policy:
            - name: service-filter
              type: string_attribute
              string_attribute:
                key: service.name
                values:
                  - "order-service"
                  - "user-service"
                  - "inventory-service"
                  - "notification-service"
                enabled_regex_matching: false
            - name: rate
              type: probabilistic
              probabilistic:
                sampling_percentage: ${DEFAULT_SERVICE_RATE:-25}

      # -- Low-volume services: keep everything (100%) --
      # Internal tooling, admin services, and batch jobs that produce
      # very few traces. Keeping 100% is cheap and gives full visibility.
      - name: low-volume-services
        type: and
        and:
          and_sub_policy:
            - name: service-filter
              type: string_attribute
              string_attribute:
                key: service.name
                values:
                  - "admin-dashboard"
                  - "cron-scheduler"
                  - "migration-runner"
                enabled_regex_matching: false
            - name: rate
              type: probabilistic
              probabilistic:
                sampling_percentage: 100

      # =====================================================================
      # Policy 4: Fallback for unlisted services
      # =====================================================================
      # Any service not explicitly listed above gets a default sampling
      # rate. This prevents new/unknown services from being silently
      # dropped or flooding the backend.
      - name: default-fallback
        type: probabilistic
        probabilistic:
          sampling_percentage: ${DEFAULT_SERVICE_RATE:-25}

service:
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - tail_sampling
        - batch
      exporters:
        - otlp/backend
