# --------------------------------------------------------------------------
# Helm values for OpenTelemetry Collector Agent (DaemonSet mode)
# Generic Kubernetes platform - reusable by EKS/AKS/GKE
#
# Chart: open-telemetry/opentelemetry-collector
# --------------------------------------------------------------------------

# Run as DaemonSet - one pod per node
mode: daemonset

# Use the contrib distribution for full receiver/processor support
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "${OTEL_COLLECTOR_VERSION:-0.96.0}"
  pullPolicy: IfNotPresent

fullnameOverride: otel-agent

# Service account with RBAC for K8s metadata access
serviceAccount:
  create: true
  name: otel-collector
  annotations: {}

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: [nodes, nodes/proxy, nodes/stats, pods, pods/status, namespaces, endpoints, services, events, replicationcontrollers, resourcequotas]
      verbs: [get, list, watch]
    - apiGroups: ["apps"]
      resources: [deployments, replicasets, daemonsets, statefulsets]
      verbs: [get, list, watch]
    - apiGroups: ["batch"]
      resources: [jobs, cronjobs]
      verbs: [get, list, watch]
    - apiGroups: ["autoscaling"]
      resources: [horizontalpodautoscalers]
      verbs: [get, list, watch]

# Resource limits
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Tolerations so agent runs on all nodes
tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

nodeSelector:
  kubernetes.io/os: linux

# Ports exposed by the agent
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# Health and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 15
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 10
  periodSeconds: 10

# Environment variables
extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: K8S_POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: K8S_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP

# Volume mounts for host metrics, logs
extraVolumes:
  - name: hostfs
    hostPath:
      path: /
      type: Directory
  - name: varlog
    hostPath:
      path: /var/log
      type: Directory
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: hostfs
    mountPath: /hostfs
    readOnly: true
    mountPropagation: HostToContainer
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

# Collector configuration
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    hostmetrics:
      collection_interval: 30s
      root_path: /hostfs
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        disk: {}
        filesystem:
          exclude_mount_points:
            mount_points:
              - /dev/*
              - /proc/*
              - /sys/*
            match_type: regexp
        load: {}
        network: {}
        paging: {}
        processes: {}

    kubeletstats:
      collection_interval: 30s
      auth_type: serviceAccount
      endpoint: "https://${env:K8S_NODE_NAME}:10250"
      insecure_skip_verify: true
      metric_groups:
        - node
        - pod
        - container
        - volume

    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/*/otc-container/*.log
      start_at: end
      include_file_path: true
      include_file_name: false
      operators:
        - type: router
          id: get-format
          routes:
            - output: parser-docker
              expr: 'body matches "^\\{"'
            - output: parser-containerd
              expr: 'body matches "^[^ Z]+Z"'
        - type: json_parser
          id: parser-docker
          output: extract-metadata-from-filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        - type: regex_parser
          id: parser-containerd
          regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
          output: extract-metadata-from-filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"
        - type: regex_parser
          id: extract-metadata-from-filepath
          regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
          parse_from: attributes["log.file.path"]
          cache:
            size: 128
        - type: move
          from: attributes.namespace
          to: resource["k8s.namespace.name"]
        - type: move
          from: attributes.pod_name
          to: resource["k8s.pod.name"]
        - type: move
          from: attributes.uid
          to: resource["k8s.pod.uid"]
        - type: move
          from: attributes.container_name
          to: resource["k8s.container.name"]
        - type: move
          from: attributes.restart_count
          to: resource["k8s.container.restart_count"]
        - type: move
          from: attributes.log
          to: body

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    batch:
      send_batch_size: 8192
      send_batch_max_size: 16384
      timeout: 5s

    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      filter:
        node_from_env_var: K8S_NODE_NAME
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.job.name
          - k8s.cronjob.name
          - k8s.container.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

    resourcedetection:
      detectors: [system, env]
      system:
        hostname_sources: [os]
      timeout: 5s
      override: false

    resource:
      attributes:
        - key: k8s.cluster.name
          value: "${K8S_CLUSTER_NAME:-unknown}"
          action: upsert
        - key: deployment.environment
          value: "${DEPLOYMENT_ENVIRONMENT:-production}"
          action: upsert

  exporters:
    otlp:
      endpoint: "otel-gateway.${OTEL_NAMESPACE:-observability}.svc.cluster.local:4317"
      tls:
        insecure: true
      sending_queue:
        enabled: true
        num_consumers: 4
        queue_size: 5000
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
        exporters: [otlp]
      metrics:
        receivers: [otlp, hostmetrics, kubeletstats]
        processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
        exporters: [otlp]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
        exporters: [otlp]
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888
