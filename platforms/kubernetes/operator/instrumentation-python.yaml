# --------------------------------------------------------------------------
# Instrumentation CR - Python Auto-Instrumentation
# Generic Kubernetes platform - reusable by EKS/AKS/GKE
#
# Configures the OpenTelemetry Operator to automatically inject the Python
# instrumentation into annotated pods. Add the annotation to your pod spec:
#   instrumentation.opentelemetry.io/inject-python: "true"
# --------------------------------------------------------------------------
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: otel-instrumentation-python
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-instrumentation-python
    app.kubernetes.io/component: instrumentation
    app.kubernetes.io/part-of: opentelemetry
spec:
  # OTLP exporter endpoint - points to the agent DaemonSet on the same node
  exporter:
    endpoint: http://otel-agent.${OTEL_NAMESPACE:-observability}.svc.cluster.local:4317

  # Propagation formats
  propagators:
    - tracecontext
    - baggage
    - b3
    - b3multi

  # Sampler configuration
  sampler:
    type: parentbased_traceidratio
    argument: "${INSTRUMENTATION_SAMPLER_RATIO:-1.0}"

  # Resource attributes applied to all telemetry
  resource:
    resourceAttributes:
      deployment.environment:
        value: ${DEPLOYMENT_ENVIRONMENT:-production}
      k8s.cluster.name:
        value: ${K8S_CLUSTER_NAME:-unknown}

  # Python-specific configuration
  python:
    image: ${OTEL_PYTHON_AGENT_IMAGE:-ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python}:${OTEL_PYTHON_AGENT_VERSION:-0.43b0}

    env:
      # Configure exporters
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"

      - name: OTEL_METRICS_EXPORTER
        value: "otlp"

      - name: OTEL_LOGS_EXPORTER
        value: "otlp"

      # Resource attributes
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=${SERVICE_NAMESPACE:-default}"

      # Python-specific instrumentation settings
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"

      - name: OTEL_PYTHON_LOG_LEVEL
        value: "${OTEL_PYTHON_LOG_LEVEL:-info}"

      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "${OTEL_PYTHON_LOGGING_ENABLED:-true}"

      # Excluded URLs (health checks, readiness probes)
      - name: OTEL_PYTHON_EXCLUDED_URLS
        value: "${OTEL_PYTHON_EXCLUDED_URLS:-health,healthz,readyz,livez,ready,live,metrics,favicon.ico}"

      # Metric export interval
      - name: OTEL_METRIC_EXPORT_INTERVAL
        value: "${OTEL_METRIC_EXPORT_INTERVAL:-60000}"

    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
