# --------------------------------------------------------------------------
# Instrumentation CR - Java Auto-Instrumentation
# Generic Kubernetes platform - reusable by EKS/AKS/GKE
#
# Configures the OpenTelemetry Operator to automatically inject the Java
# agent into annotated pods. Add the annotation to your pod spec:
#   instrumentation.opentelemetry.io/inject-java: "true"
# --------------------------------------------------------------------------
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: otel-instrumentation-java
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-instrumentation-java
    app.kubernetes.io/component: instrumentation
    app.kubernetes.io/part-of: opentelemetry
spec:
  # OTLP exporter endpoint - points to the agent DaemonSet on the same node
  exporter:
    endpoint: http://otel-agent.${OTEL_NAMESPACE:-observability}.svc.cluster.local:4317

  # Propagation formats
  propagators:
    - tracecontext
    - baggage
    - b3
    - b3multi

  # Sampler configuration
  sampler:
    type: parentbased_traceidratio
    argument: "${INSTRUMENTATION_SAMPLER_RATIO:-1.0}"

  # Resource attributes applied to all telemetry
  resource:
    resourceAttributes:
      deployment.environment:
        value: ${DEPLOYMENT_ENVIRONMENT:-production}
      k8s.cluster.name:
        value: ${K8S_CLUSTER_NAME:-unknown}

  # Java-specific configuration
  java:
    image: ${OTEL_JAVA_AGENT_IMAGE:-ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java}:${OTEL_JAVA_AGENT_VERSION:-2.1.0}

    env:
      # Enable runtime metrics
      - name: OTEL_INSTRUMENTATION_RUNTIME_METRICS_ENABLED
        value: "true"

      # Enable DB statement sanitization
      - name: OTEL_INSTRUMENTATION_JDBC_STATEMENT_SANITIZER_ENABLED
        value: "true"

      # Configure resource attributes
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=${SERVICE_NAMESPACE:-default}"

      # Logs exporter
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"

      # Metrics exporter
      - name: OTEL_METRICS_EXPORTER
        value: "otlp"

      # Traces exporter
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"

      # Export interval for metrics
      - name: OTEL_METRIC_EXPORT_INTERVAL
        value: "${OTEL_METRIC_EXPORT_INTERVAL:-60000}"

      # Additional JVM options for the agent
      - name: OTEL_JAVAAGENT_DEBUG
        value: "${OTEL_JAVAAGENT_DEBUG:-false}"

    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
