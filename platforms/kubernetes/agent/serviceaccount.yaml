# --------------------------------------------------------------------------
# ServiceAccount, ClusterRole, and ClusterRoleBinding for OTel Collector
# Grants read access to nodes, pods, namespaces, events for metadata enrichment
# --------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: opentelemetry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: opentelemetry
rules:
  # Needed by k8sattributes processor and k8s_cluster receiver
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/stats
      - pods
      - pods/status
      - namespaces
      - endpoints
      - services
      - events
      - replicationcontrollers
      - resourcequotas
    verbs: ["get", "list", "watch"]

  # Needed by k8s_cluster receiver for workload metadata
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]

  # Needed by k8s_cluster receiver for batch workloads
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

  # Needed by k8s_cluster receiver for autoscaling info
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

  # Needed by kubeletstats receiver
  - apiGroups: [""]
    resources:
      - nodes/stats
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: opentelemetry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: ${OTEL_NAMESPACE:-observability}
