# --------------------------------------------------------------------------
# Deployment for OpenTelemetry Collector Gateway
# Generic Kubernetes platform - reusable by EKS/AKS/GKE
#
# Runs as a centralized Deployment (2 replicas) receiving telemetry from
# all agents, applying tail sampling, and exporting to the backend.
# --------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: opentelemetry
spec:
  replicas: ${GATEWAY_REPLICAS:-2}
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-gateway
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: opentelemetry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-collector
      terminationGracePeriodSeconds: 60

      # Anti-affinity: spread gateway pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: otel-gateway
                    app.kubernetes.io/component: gateway
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: otel-gateway
                    app.kubernetes.io/component: gateway
                topologyKey: topology.kubernetes.io/zone

      # Prefer Linux nodes
      nodeSelector:
        kubernetes.io/os: linux

      containers:
        - name: otel-gateway
          image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib}:${OTEL_COLLECTOR_VERSION:-0.96.0}
          imagePullPolicy: IfNotPresent
          command:
            - "/otelcol-contrib"
            - "--config=/etc/otelcol/config.yaml"

          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: zpages
              containerPort: 55679
              protocol: TCP

          env:
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Backend configuration from ConfigMap
            - name: BACKEND_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: otel-env-config
                  key: BACKEND_OTLP_ENDPOINT
            - name: K8S_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: otel-env-config
                  key: K8S_CLUSTER_NAME
                  optional: true
            - name: DEPLOYMENT_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: otel-env-config
                  key: DEPLOYMENT_ENVIRONMENT
                  optional: true
            - name: OTEL_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: otel-env-config
                  key: OTEL_LOG_LEVEL
                  optional: true
            # Secrets for backend authentication
            - name: BACKEND_OTLP_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: otel-secrets
                  key: BACKEND_OTLP_AUTH_HEADER
                  optional: true

          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001

      volumes:
        - name: config
          configMap:
            name: otel-gateway-config
            items:
              - key: config.yaml
                path: config.yaml
