# Helm chart values for OpenTelemetry Collector Gateway on GKE
# Chart: open-telemetry/opentelemetry-collector
# Mode: Deployment (centralized gateway)

mode: deployment

nameOverride: "otel-gateway"
fullnameOverride: "otel-gateway"

replicaCount: 2

image:
  repository: "otel/opentelemetry-collector-contrib"
  tag: "${OTEL_COLLECTOR_VERSION}"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "${OTEL_GATEWAY_SERVICE_ACCOUNT}"
  annotations:
    iam.gke.io/gcp-service-account: "${GCP_SERVICE_ACCOUNT_EMAIL}"

extraEnvs:
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: K8S_POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: K8S_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: GCP_PROJECT_ID
    value: "${GCP_PROJECT_ID}"
  - name: GCP_LOG_NAME
    value: "${GCP_LOG_NAME}"
  - name: GCP_METRIC_PREFIX
    value: "${GCP_METRIC_PREFIX}"
  - name: CLUSTER_NAME
    value: "${CLUSTER_NAME}"
  - name: ENVIRONMENT
    value: "${ENVIRONMENT}"
  - name: OTLP_GRPC_PORT
    value: "${OTLP_GRPC_PORT}"
  - name: OTLP_HTTP_PORT
    value: "${OTLP_HTTP_PORT}"
  - name: GATEWAY_BATCH_SIZE
    value: "${GATEWAY_BATCH_SIZE}"
  - name: GATEWAY_BATCH_MAX_SIZE
    value: "${GATEWAY_BATCH_MAX_SIZE}"
  - name: MEMORY_LIMITER_CHECK_INTERVAL
    value: "${MEMORY_LIMITER_CHECK_INTERVAL}"
  - name: TAIL_SAMPLING_WAIT
    value: "${TAIL_SAMPLING_WAIT}"
  - name: TAIL_SAMPLING_NUM_TRACES
    value: "${TAIL_SAMPLING_NUM_TRACES}"
  - name: TAIL_SAMPLING_EXPECTED_NEW_TRACES
    value: "${TAIL_SAMPLING_EXPECTED_NEW_TRACES}"
  - name: TAIL_SAMPLING_MAX_SPANS_PER_SEC
    value: "${TAIL_SAMPLING_MAX_SPANS_PER_SEC}"
  - name: TAIL_SAMPLING_LATENCY_THRESHOLD_MS
    value: "${TAIL_SAMPLING_LATENCY_THRESHOLD_MS}"
  - name: TAIL_SAMPLING_PERCENTAGE
    value: "${TAIL_SAMPLING_PERCENTAGE}"
  - name: SECONDARY_OTLP_ENDPOINT
    value: "${SECONDARY_OTLP_ENDPOINT}"
  - name: SECONDARY_OTLP_TLS_INSECURE
    value: "${SECONDARY_OTLP_TLS_INSECURE}"
  - name: SECONDARY_OTLP_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: "${OTLP_AUTH_SECRET_NAME}"
        key: token
        optional: true
  - name: HEALTH_CHECK_PORT
    value: "${HEALTH_CHECK_PORT}"
  - name: ZPAGES_PORT
    value: "${ZPAGES_PORT}"
  - name: OTEL_LOG_LEVEL
    value: "${OTEL_LOG_LEVEL}"
  - name: TELEMETRY_METRICS_PORT
    value: "${TELEMETRY_METRICS_PORT}"

config:
  # Config is loaded from otel-gateway.yaml via ConfigMap
  receivers: null
  processors: null
  exporters: null
  service: null

configMap:
  create: false
  existingName: "otel-gateway-config"

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  health:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP

resources:
  limits:
    cpu: "${GATEWAY_CPU_LIMIT}"
    memory: "${GATEWAY_MEMORY_LIMIT}"
  requests:
    cpu: "${GATEWAY_CPU_REQUEST}"
    memory: "${GATEWAY_MEMORY_REQUEST}"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: ${GATEWAY_MAX_REPLICAS}
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "${TELEMETRY_METRICS_PORT}"

podLabels:
  app.kubernetes.io/component: otel-gateway
  app.kubernetes.io/part-of: observability

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/component: otel-gateway

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: otel-gateway
          topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 5
  periodSeconds: 5

service:
  type: ClusterIP
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
