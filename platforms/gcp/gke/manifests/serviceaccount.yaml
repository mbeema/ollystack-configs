# ServiceAccount for OpenTelemetry Collector with GKE Workload Identity
# Requires binding the Kubernetes SA to a GCP SA via:
#   gcloud iam service-accounts add-iam-policy-binding \
#     ${GCP_SERVICE_ACCOUNT_EMAIL} \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:${GCP_PROJECT_ID}.svc.id.goog[${OTEL_NAMESPACE}/${OTEL_AGENT_SERVICE_ACCOUNT}]"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${OTEL_AGENT_SERVICE_ACCOUNT}
  namespace: ${OTEL_NAMESPACE}
  labels:
    app.kubernetes.io/name: otel-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: observability
  annotations:
    iam.gke.io/gcp-service-account: "${GCP_SERVICE_ACCOUNT_EMAIL}"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${OTEL_GATEWAY_SERVICE_ACCOUNT}
  namespace: ${OTEL_NAMESPACE}
  labels:
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: observability
  annotations:
    iam.gke.io/gcp-service-account: "${GCP_SERVICE_ACCOUNT_EMAIL}"
