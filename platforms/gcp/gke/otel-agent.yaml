# OpenTelemetry Collector Agent Configuration for GKE
# Deployed as DaemonSet on each node
# Uses GCP Workload Identity for authentication

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:${OTLP_GRPC_PORT}"
      http:
        endpoint: "0.0.0.0:${OTLP_HTTP_PORT}"

  hostmetrics:
    collection_interval: ${HOST_METRICS_INTERVAL}
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk:
        metrics:
          system.disk.io:
            enabled: true
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load:
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network:
      paging:
      processes:

  kubeletstats:
    collection_interval: ${KUBELET_STATS_INTERVAL}
    auth_type: serviceAccount
    endpoint: "https://${K8S_NODE_NAME}:10250"
    insecure_skip_verify: true
    metric_groups:
      - node
      - pod
      - container
      - volume
    extra_metadata_labels:
      - container.id
    k8s_api_config:
      auth_type: serviceAccount

  filelog:
    include:
      - /var/log/pods/*/*/*.log
    exclude:
      - /var/log/pods/*/otc-container/*.log
    start_at: ${FILELOG_START_AT}
    include_file_path: true
    include_file_name: false
    operators:
      - type: router
        id: get-format
        routes:
          - output: parser-docker
            expr: 'body matches "^\\{"'
          - output: parser-crio
            expr: 'body matches "^[^ Z]+ "'
          - output: parser-containerd
            expr: 'body matches "^[^ Z]+Z"'
      - type: regex_parser
        id: parser-crio
        regex: "^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
        output: extract_metadata_from_filepath
        timestamp:
          parse_from: attributes.time
          layout_type: gotime
          layout: "2006-01-02T15:04:05.999999999Z07:00"
      - type: regex_parser
        id: parser-containerd
        regex: "^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
        output: extract_metadata_from_filepath
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: json_parser
        id: parser-docker
        output: extract_metadata_from_filepath
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: regex_parser
        id: extract_metadata_from_filepath
        regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
        parse_from: attributes["log.file.path"]
        cache:
          size: 128
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]
      - type: move
        from: attributes.container_name
        to: resource["k8s.container.name"]
      - type: move
        from: attributes.namespace
        to: resource["k8s.namespace.name"]
      - type: move
        from: attributes.pod_name
        to: resource["k8s.pod.name"]
      - type: move
        from: attributes.uid
        to: resource["k8s.pod.uid"]
      - type: move
        from: attributes.restart_count
        to: resource["k8s.container.restart_count"]

processors:
  k8sattributes:
    auth_type: "serviceAccount"
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.start_time
        - k8s.replicaset.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.job.name
        - k8s.cronjob.name
      labels:
        - tag_name: app.label.component
          key: app.kubernetes.io/component
          from: pod
      annotations:
        - tag_name: app.annotation.owner
          key: owner
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  resourcedetection:
    detectors:
      - env
      - gcp
    timeout: 5s
    override: false

  batch:
    send_batch_size: ${BATCH_SIZE}
    send_batch_max_size: ${BATCH_MAX_SIZE}
    timeout: ${BATCH_TIMEOUT}

  memory_limiter:
    check_interval: ${MEMORY_LIMITER_CHECK_INTERVAL}
    limit_mib: ${MEMORY_LIMITER_LIMIT_MIB}
    spike_limit_mib: ${MEMORY_LIMITER_SPIKE_MIB}

exporters:
  otlp:
    endpoint: "${GATEWAY_ENDPOINT}"
    tls:
      insecure: ${GATEWAY_TLS_INSECURE}
    headers:
      x-cluster-name: "${CLUSTER_NAME}"
      x-environment: "${ENVIRONMENT}"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000

extensions:
  health_check:
    endpoint: "0.0.0.0:${HEALTH_CHECK_PORT}"
  zpages:
    endpoint: "0.0.0.0:${ZPAGES_PORT}"

service:
  extensions:
    - health_check
    - zpages
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp
    metrics:
      receivers:
        - otlp
        - hostmetrics
        - kubeletstats
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp
    logs:
      receivers:
        - otlp
        - filelog
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp
  telemetry:
    logs:
      level: "${OTEL_LOG_LEVEL}"
    metrics:
      address: "0.0.0.0:${TELEMETRY_METRICS_PORT}"
