# OpenTelemetry Collector Agent Configuration for Azure Linux VMs
# Deployed via install-collector-linux.sh as a systemd service.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  hostmetrics:
    collection_interval: ${HOST_METRICS_INTERVAL:-15s}
    root_path: /
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/*
            - /snap/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
            - tmpfs
          match_type: strict
      load: {}
      network: {}
      paging: {}
      processes: {}
      process:
        include:
          match_type: regexp
          names:
            - ".*"
        mute_process_name_error: true
        mute_process_exe_error: true

  filelog:
    include:
      - /var/log/syslog
      - /var/log/messages
      - /var/log/auth.log
      - /var/log/secure
      - /var/log/cloud-init.log
      - /var/log/waagent.log
      - ${APP_LOG_PATH:-/var/log/app/*.log}
    exclude:
      - /var/log/lastlog
      - /var/log/btmp
      - /var/log/wtmp
    start_at: end
    include_file_path: true
    include_file_name: true
    operators:
      - type: regex_parser
        id: syslog_parser
        if: 'body matches "^[A-Z][a-z]{2}\\s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2}"'
        regex: '^(?P<time>[A-Z][a-z]{2}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+(?P<process>\S+?)(?:\[(?P<pid>\d+)\])?:\s+(?P<message>.*)$'
        timestamp:
          parse_from: attributes.time
          layout: "%b %d %H:%M:%S"
        severity:
          parse_from: attributes.message

  journald:
    directory: /var/log/journal
    units:
      - sshd
      - systemd
      - walinuxagent
      - ${JOURNALD_UNITS:-}
    priority: ${JOURNALD_PRIORITY:-info}

processors:
  resourcedetection:
    detectors:
      - azure
      - env
    timeout: 5s
    override: false
    azure:
      resource_attributes:
        cloud.provider:
          enabled: true
        cloud.platform:
          enabled: true
        cloud.region:
          enabled: true
        cloud.account.id:
          enabled: true
        host.id:
          enabled: true
        host.name:
          enabled: true
        azure.vm.name:
          enabled: true
        azure.vm.size:
          enabled: true
        azure.vm.scaleset.name:
          enabled: true
        azure.resourcegroup.name:
          enabled: true

  batch:
    send_batch_size: ${BATCH_SIZE:-512}
    timeout: ${BATCH_TIMEOUT:-5s}
    send_batch_max_size: 1024

  memory_limiter:
    check_interval: 5s
    limit_mib: ${MEMORY_LIMIT_MIB:-512}
    spike_limit_mib: ${MEMORY_SPIKE_LIMIT_MIB:-128}

  resource:
    attributes:
      - key: deployment.environment
        value: ${ENVIRONMENT:-production}
        action: upsert
      - key: service.namespace
        value: ${SERVICE_NAMESPACE:-azure-vm}
        action: upsert
      - key: service.name
        value: ${SERVICE_NAME:-linux-vm-agent}
        action: upsert

exporters:
  otlp:
    endpoint: "${OTLP_ENDPOINT}"
    tls:
      insecure: ${OTLP_TLS_INSECURE:-false}
      cert_file: ${OTLP_TLS_CERT:-}
      key_file: ${OTLP_TLS_KEY:-}
    headers:
      Authorization: "Bearer ${OTLP_AUTH_TOKEN:-}"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
      storage: file_storage

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  file_storage:
    directory: /var/lib/otelcol/storage
    timeout: 10s
    compaction:
      on_start: true
      directory: /var/lib/otelcol/storage/compaction

service:
  extensions:
    - health_check
    - file_storage
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp
    metrics:
      receivers:
        - otlp
        - hostmetrics
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp
    logs:
      receivers:
        - otlp
        - filelog
        - journald
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp
  telemetry:
    logs:
      level: ${OTEL_LOG_LEVEL:-info}
    metrics:
      address: "0.0.0.0:8888"
