# Deployment for OpenTelemetry Collector Gateway on Azure AKS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: opentelemetry
spec:
  replicas: ${GATEWAY_REPLICAS:-2}
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-gateway
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: opentelemetry
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-gateway
              app.kubernetes.io/component: gateway
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: otel-gateway
                    app.kubernetes.io/component: gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: otel-gateway
          image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.96.0}
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/otelcol/config.yaml"
          env:
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: azure-monitor-secrets
                  key: connection-string
            - name: OTLP_EXPORTER_ENDPOINT
              value: "${OTLP_EXPORTER_ENDPOINT}"
            - name: OTLP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-exporter-secrets
                  key: auth-token
                  optional: true
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.cluster.name=${AKS_CLUSTER_NAME},deployment.environment=${ENVIRONMENT:-production}"
            - name: OTEL_LOG_LEVEL
              value: "${OTEL_LOG_LEVEL:-info}"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: healthcheck
              containerPort: 13133
              protocol: TCP
          resources:
            limits:
              cpu: ${GATEWAY_CPU_LIMIT:-2}
              memory: ${GATEWAY_MEMORY_LIMIT:-4Gi}
            requests:
              cpu: ${GATEWAY_CPU_REQUEST:-500m}
              memory: ${GATEWAY_MEMORY_REQUEST:-1Gi}
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-gateway-config
