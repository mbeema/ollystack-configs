# DaemonSet for OTel Agent on EKS
# Runs one agent pod per node to collect traces, metrics, and logs.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: opentelemetry
    platform: aws
    service: eks
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-agent
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: opentelemetry
        platform: aws
        service: eks
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-agent
      priorityClassName: system-node-critical
      # Tolerate all taints to ensure agent runs on every node
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: otel-agent
          image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.98.0}
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              hostPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              hostPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: healthcheck
              containerPort: 13133
              protocol: TCP
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: EKS_CLUSTER_NAME
              value: ${EKS_CLUSTER_NAME}
            - name: OTEL_GATEWAY_ENDPOINT
              value: ${OTEL_GATEWAY_ENDPOINT:-otel-gateway.observability.svc.cluster.local:4317}
            - name: OTEL_LOG_LEVEL
              value: ${OTEL_LOG_LEVEL:-info}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.cluster.name=${EKS_CLUSTER_NAME},deployment.environment=${ENVIRONMENT:-production}"
          resources:
            limits:
              cpu: ${AGENT_CPU_LIMIT:-500m}
              memory: ${AGENT_MEMORY_LIMIT:-768Mi}
            requests:
              cpu: ${AGENT_CPU_REQUEST:-100m}
              memory: ${AGENT_MEMORY_REQUEST:-256Mi}
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: config
          configMap:
            name: otel-agent-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        - name: hostfs
          hostPath:
            path: /
            type: Directory
