# ServiceAccount with IRSA (IAM Roles for Service Accounts) for OTel components on EKS
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-agent
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: opentelemetry
    platform: aws
    service: eks
  annotations:
    eks.amazonaws.com/role-arn: ${OTEL_IAM_ROLE_ARN}
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-gateway
  namespace: ${OTEL_NAMESPACE:-observability}
  labels:
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: opentelemetry
    platform: aws
    service: eks
  annotations:
    eks.amazonaws.com/role-arn: ${OTEL_IAM_ROLE_ARN}
    eks.amazonaws.com/sts-regional-endpoints: "true"
