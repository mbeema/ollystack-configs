# ClusterRole for OTel Collector on EKS
# Grants permissions needed for k8sattributes processor and kubeletstats receiver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: opentelemetry
    platform: aws
    service: eks
rules:
  # Required by k8sattributes processor to resolve pod metadata
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
      - endpoints
      - events
    verbs:
      - get
      - list
      - watch

  # Required by k8sattributes processor for ReplicaSet owner references
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  # Required for kubeletstats receiver to read node and pod stats
  - apiGroups: [""]
    resources:
      - nodes/stats
      - nodes/proxy
    verbs:
      - get

  # Required for discovering services and ingresses
  - apiGroups: [""]
    resources:
      - services
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch

  # Required for reading events
  - apiGroups: ["events.k8s.io"]
    resources:
      - events
    verbs:
      - get
      - list
      - watch
