# EKS OTel Agent Configuration (DaemonSet)
# Deployed on every EKS node to collect telemetry from pods and the host.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  hostmetrics:
    collection_interval: ${HOSTMETRICS_INTERVAL:-15s}
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk: {}
      filesystem: {}
      load: {}
      network: {}
      paging: {}
      processes: {}

  kubeletstats:
    collection_interval: ${KUBELETSTATS_INTERVAL:-20s}
    auth_type: serviceAccount
    endpoint: "https://${env:K8S_NODE_NAME}:10250"
    insecure_skip_verify: true
    metric_groups:
      - node
      - pod
      - container
      - volume
    extra_metadata_labels:
      - container.id
    k8s_api_config:
      auth_type: serviceAccount

  filelog:
    include:
      - /var/log/pods/*/*/*.log
    exclude:
      - /var/log/pods/observability_*/*/*.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: router
        id: get-format
        routes:
          - output: parser-docker
            expr: 'body matches "^\\{"'
          - output: parser-crio
            expr: 'body matches "^[^ Z]+ "'
          - output: parser-containerd
            expr: 'body matches "^[^ Z]+Z"'
      - type: json_parser
        id: parser-docker
        output: extract-metadata
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: regex_parser
        id: parser-crio
        regex: "^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
        output: extract-metadata
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%L%j"
      - type: regex_parser
        id: parser-containerd
        regex: "^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
        output: extract-metadata
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: move
        id: extract-metadata
        from: attributes.log
        to: body
      - type: add
        field: resource["k8s.cluster.name"]
        value: ${EKS_CLUSTER_NAME}

processors:
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.container.name
        - container.id
        - container.image.name
        - container.image.tag
      labels:
        - tag_name: app.label.name
          key: app.kubernetes.io/name
          from: pod
        - tag_name: app.label.component
          key: app.kubernetes.io/component
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  resourcedetection:
    detectors:
      - ec2
      - eks
      - env
    timeout: 5s
    override: false
    ec2:
      tags:
        - ^Name$
        - ^Environment$
        - ^Team$
    eks:
      resource_attributes:
        k8s.cluster.name:
          enabled: true

  batch:
    send_batch_size: ${BATCH_SIZE:-512}
    send_batch_max_size: ${BATCH_MAX_SIZE:-1024}
    timeout: ${BATCH_TIMEOUT:-5s}

  memory_limiter:
    check_interval: 5s
    limit_mib: ${MEMORY_LIMITER_LIMIT_MIB:-512}
    spike_limit_mib: ${MEMORY_LIMITER_SPIKE_MIB:-128}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  otlp:
    endpoint: ${OTEL_GATEWAY_ENDPOINT:-otel-gateway.observability.svc.cluster.local:4317}
    tls:
      insecure: ${OTEL_EXPORTER_TLS_INSECURE:-true}
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 256
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  telemetry:
    logs:
      level: ${OTEL_LOG_LEVEL:-info}
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp

    metrics:
      receivers:
        - otlp
        - hostmetrics
        - kubeletstats
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp

    logs:
      receivers:
        - otlp
        - filelog
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - batch
      exporters:
        - otlp

  extensions:
    - health_check
    - zpages
