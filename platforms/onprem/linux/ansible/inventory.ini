# =============================================================================
# OpenTelemetry Collector - Ansible Inventory
# =============================================================================
# Customize this inventory for your environment.
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Agent hosts - each runs an OTel Collector in agent mode
# ---------------------------------------------------------------------------
[otel_agents]
# Application servers
app-server-01    ansible_host=10.0.1.10
app-server-02    ansible_host=10.0.1.11
app-server-03    ansible_host=10.0.1.12

# Database servers
db-server-01     ansible_host=10.0.2.10
db-server-02     ansible_host=10.0.2.11

# Web servers
web-server-01    ansible_host=10.0.3.10
web-server-02    ansible_host=10.0.3.11

# ---------------------------------------------------------------------------
# Gateway hosts - centralized OTel Collector gateways
# ---------------------------------------------------------------------------
[otel_gateways]
gateway-01       ansible_host=10.0.10.10
gateway-02       ansible_host=10.0.10.11

# ---------------------------------------------------------------------------
# Group variables
# ---------------------------------------------------------------------------
[otel_agents:vars]
gateway_endpoint=gateway-01.internal:4317
environment=production
team=platform

[otel_gateways:vars]
backend_endpoint=tempo.internal:4317
environment=production
team=platform

# ---------------------------------------------------------------------------
# Common variables for all OTel hosts
# ---------------------------------------------------------------------------
[all:vars]
ansible_user=deploy
ansible_become=true
ansible_python_interpreter=/usr/bin/python3
otel_collector_version=0.96.0
