---
# =============================================================================
# OTel Collector Role - Main Tasks
# =============================================================================

- name: Set OS-specific variables
  ansible.builtin.set_fact:
    otel_pkg_type: >-
      {{ 'deb' if ansible_os_family == 'Debian' else 'rpm' if ansible_os_family == 'RedHat' else 'tar' }}
    otel_arch: >-
      {{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}

- name: Create otel group
  ansible.builtin.group:
    name: otel
    system: true
    state: present

- name: Create otel user
  ansible.builtin.user:
    name: otel
    group: otel
    system: true
    create_home: false
    shell: /usr/sbin/nologin
    comment: "OpenTelemetry Collector"
    state: present

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: otel
    group: otel
    mode: "0755"
  loop:
    - /opt/otel-collector
    - /etc/otel-collector
    - /var/log/otel-collector
    - /var/lib/otel-collector
    - /var/lib/otel-collector/storage

- name: Download checksums file
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_checksums.txt"
    dest: "/tmp/otelcol-contrib_{{ otel_version }}_checksums.txt"
    mode: "0644"
    force: true
  register: checksums_download

- name: Extract expected checksum
  ansible.builtin.shell: >
    grep "otelcol-contrib_{{ otel_version }}_linux_{{ otel_arch | trim }}.tar.gz"
    /tmp/otelcol-contrib_{{ otel_version }}_checksums.txt | awk '{print $1}'
  register: expected_checksum
  changed_when: false
  when: checksums_download is succeeded

# ---- DEB-based installation ----
- name: Download collector deb package
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_{{ otel_arch | trim }}.deb"
    dest: "/tmp/otelcol-contrib_{{ otel_version }}.deb"
    mode: "0644"
  when: otel_pkg_type | trim == 'deb'
  register: deb_download

- name: Install collector deb package
  ansible.builtin.apt:
    deb: "/tmp/otelcol-contrib_{{ otel_version }}.deb"
    state: present
  when: otel_pkg_type | trim == 'deb' and deb_download is succeeded
  notify: Restart otel-collector

# ---- RPM-based installation ----
- name: Download collector rpm package
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_{{ otel_arch | trim }}.rpm"
    dest: "/tmp/otelcol-contrib_{{ otel_version }}.rpm"
    mode: "0644"
  when: otel_pkg_type | trim == 'rpm'
  register: rpm_download

- name: Install collector rpm package
  ansible.builtin.yum:
    name: "/tmp/otelcol-contrib_{{ otel_version }}.rpm"
    state: present
    disable_gpg_check: true
  when: otel_pkg_type | trim == 'rpm' and rpm_download is succeeded
  notify: Restart otel-collector

# ---- Tar-based installation (fallback) ----
- name: Download collector tarball
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_{{ otel_arch | trim }}.tar.gz"
    dest: "/tmp/otelcol-contrib_{{ otel_version }}.tar.gz"
    checksum: "sha256:{{ expected_checksum.stdout | default(omit) }}"
    mode: "0644"
  when: otel_pkg_type | trim == 'tar'
  register: tar_download

- name: Extract collector tarball
  ansible.builtin.unarchive:
    src: "/tmp/otelcol-contrib_{{ otel_version }}.tar.gz"
    dest: /opt/otel-collector/
    remote_src: true
    owner: otel
    group: otel
  when: otel_pkg_type | trim == 'tar' and tar_download is succeeded
  notify: Restart otel-collector

# ---- Copy binary to standard location ----
- name: Copy binary to install directory
  ansible.builtin.copy:
    src: /usr/bin/otelcol-contrib
    dest: /opt/otel-collector/otelcol-contrib
    remote_src: true
    owner: otel
    group: otel
    mode: "0755"
  when: otel_pkg_type | trim in ['deb', 'rpm']
  failed_when: false

# ---- Configuration ----
- name: Deploy collector configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/otel-collector/config.yaml
    owner: otel
    group: otel
    mode: "0640"
    validate: "/opt/otel-collector/otelcol-contrib validate --config=%s"
  notify: Restart otel-collector

- name: Deploy environment file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/otel-collector/env
    owner: otel
    group: otel
    mode: "0640"
  notify: Restart otel-collector

# ---- Systemd service ----
- name: Deploy systemd service file
  ansible.builtin.template:
    src: "otel-collector-{{ otel_mode }}.service.j2"
    dest: "/etc/systemd/system/otel-collector-{{ otel_mode }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart otel-collector

- name: Enable and start otel-collector service
  ansible.builtin.systemd:
    name: "otel-collector-{{ otel_mode }}"
    enabled: true
    state: started
    daemon_reload: true

# ---- Verification ----
- name: Wait for collector health check
  ansible.builtin.uri:
    url: http://localhost:13133
    method: GET
    status_code: 200
  register: health_check
  retries: 10
  delay: 3
  until: health_check.status == 200

- name: Display collector version
  ansible.builtin.command: /opt/otel-collector/otelcol-contrib --version
  register: collector_version
  changed_when: false

- name: Print collector version
  ansible.builtin.debug:
    msg: "Installed OTel Collector: {{ collector_version.stdout }}"
