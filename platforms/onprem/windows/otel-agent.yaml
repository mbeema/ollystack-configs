# OpenTelemetry Collector Agent Configuration - Windows Host
# Runs on each Windows host to collect local telemetry and forward to gateway.
#
# Environment Variables:
#   GATEWAY_ENDPOINT    - Gateway OTLP gRPC endpoint (e.g., gateway.internal:4317)
#   ENVIRONMENT         - Deployment environment (e.g., production, staging)
#   TEAM                - Owning team name
#   NODE_NAME           - Logical node/host name override
#   OTLP_GRPC_PORT      - OTLP gRPC listen port (default: 4317)
#   OTLP_HTTP_PORT      - OTLP HTTP listen port (default: 4318)
#   MEMORY_LIMIT_MIB    - Memory limiter hard limit (default: 400)
#   MEMORY_SPIKE_MIB    - Memory limiter spike limit (default: 100)

receivers:
  # OTLP receiver for application-instrumented telemetry
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${OTLP_GRPC_PORT:-4317}
      http:
        endpoint: 0.0.0.0:${OTLP_HTTP_PORT:-4318}

  # Host metrics collection for Windows
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
        metrics:
          system.disk.io:
            enabled: true
          system.disk.operations:
            enabled: true
      network:
        metrics:
          system.network.io:
            enabled: true
          system.network.connections:
            enabled: true
          system.network.errors:
            enabled: true

  # File log receiver for Windows log files
  filelog:
    include:
      - 'C:\logs\*.log'
      - 'C:\inetpub\logs\LogFiles\**\*.log'
      - 'C:\ProgramData\otel-collector\logs\*.log'
    include_file_name: true
    include_file_path: true
    poll_interval: 1s
    start_at: end
    operators:
      - type: move
        from: body
        to: attributes.original_body
      - type: add
        field: attributes.source
        value: filelog
      - type: move
        from: attributes.original_body
        to: body

  # Windows Event Log receiver
  windowseventlog:
    channel: Application
    start_at: end
  windowseventlog/system:
    channel: System
    start_at: end
  windowseventlog/security:
    channel: Security
    start_at: end

processors:
  # Resource detection for Windows hosts
  resourcedetection:
    detectors:
      - system
    system:
      hostname_sources:
        - lookup
        - os
      resource_attributes:
        host.name:
          enabled: true
        host.id:
          enabled: true
        os.type:
          enabled: true
        os.description:
          enabled: true
        host.arch:
          enabled: true

  # Add custom resource attributes from environment variables
  resource:
    attributes:
      - key: deployment.environment
        value: ${ENVIRONMENT:-unknown}
        action: upsert
      - key: team
        value: ${TEAM:-platform}
        action: upsert
      - key: node.name
        value: ${NODE_NAME:-}
        action: upsert
      - key: collector.type
        value: agent
        action: upsert
      - key: os.platform
        value: windows
        action: upsert

  # Batch processor
  batch:
    send_batch_size: 8192
    send_batch_max_size: 16384
    timeout: 5s

  # Memory limiter
  memory_limiter:
    check_interval: 5s
    limit_mib: ${MEMORY_LIMIT_MIB:-400}
    spike_limit_mib: ${MEMORY_SPIKE_MIB:-100}

exporters:
  # Forward all telemetry to the gateway via OTLP gRPC
  otlp:
    endpoint: ${GATEWAY_ENDPOINT}
    tls:
      insecure: ${OTLP_INSECURE:-true}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  # Debug exporter for troubleshooting
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions:
    - health_check
    - zpages

  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp

    metrics:
      receivers:
        - otlp
        - hostmetrics
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp

    logs:
      receivers:
        - otlp
        - filelog
        - windowseventlog
        - windowseventlog/system
        - windowseventlog/security
      processors:
        - memory_limiter
        - resourcedetection
        - resource
        - batch
      exporters:
        - otlp

  telemetry:
    logs:
      level: info
      output_paths:
        - 'C:\ProgramData\otel-collector\logs\collector.log'
    metrics:
      level: basic
      address: 0.0.0.0:8888
