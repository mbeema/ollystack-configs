# =============================================================================
# Kubernetes Deployment for Python Application with OpenTelemetry
# =============================================================================
# Two approaches:
#   (a) Manual: OTel packages baked into the image, opentelemetry-instrument
#       used as the entrypoint wrapper.
#   (b) OTel Operator: Annotation-based auto-injection (zero-code).
# =============================================================================

---
# =============================================================================
# Approach A: Manual -- OTel Baked into Image
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-manual-otel
  namespace: default
  labels:
    app: python-app
    instrumentation: manual
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
      instrumentation: manual
  template:
    metadata:
      labels:
        app: python-app
        instrumentation: manual
    spec:
      containers:
        - name: python-app
          image: my-registry/my-python-app:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          # The Dockerfile ENTRYPOINT is "opentelemetry-instrument"
          # so we only need to provide the CMD here.
          command: ["opentelemetry-instrument"]
          args:
            - "gunicorn"
            - "app:app"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "4"
            - "--timeout"
            - "120"
          env:
            - name: OTEL_SERVICE_NAME
              value: "python-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default,service.version=1.0.0,k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME)"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.5"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            # K8s metadata via Downward API
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: python-app
  namespace: default
spec:
  selector:
    app: python-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
# =============================================================================
# Approach B: OTel Operator Auto-Injection (Zero-Code)
# =============================================================================
# Prerequisites:
#   1. OpenTelemetry Operator is installed in the cluster.
#   2. An Instrumentation CR exists in the namespace (see below).
# =============================================================================

apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: python-instrumentation
  namespace: default
spec:
  exporter:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "0.5"
  python:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
    env:
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-operator-otel
  namespace: default
  labels:
    app: python-app-operator
    instrumentation: otel-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app-operator
  template:
    metadata:
      labels:
        app: python-app-operator
      annotations:
        # -------------------------------------------------------------------
        # This annotation tells the OTel Operator to inject Python
        # auto-instrumentation into this pod automatically.
        # -------------------------------------------------------------------
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      containers:
        - name: python-app
          # This image does NOT need OTel packages -- the Operator injects them
          image: my-registry/my-python-app:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "python-app"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
