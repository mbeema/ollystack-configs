# =============================================================================
# Kubernetes Deployment for Node.js Application with OpenTelemetry
# =============================================================================
# Two approaches:
#   (a) Manual: OTel packages in image, NODE_OPTIONS="--require ./tracing.js"
#   (b) OTel Operator: Annotation-based auto-injection
# =============================================================================

---
# =============================================================================
# Approach A: Manual -- OTel Baked into Image
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app-manual-otel
  namespace: default
  labels:
    app: nodejs-app
    instrumentation: manual
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
      instrumentation: manual
  template:
    metadata:
      labels:
        app: nodejs-app
        instrumentation: manual
    spec:
      containers:
        - name: nodejs-app
          image: my-registry/my-nodejs-app:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            # Load tracing.js before the app via NODE_OPTIONS
            - name: NODE_OPTIONS
              value: "--require ./tracing.js"
            - name: OTEL_SERVICE_NAME
              value: "nodejs-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default,service.version=1.0.0,k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME)"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.5"
            # K8s metadata via Downward API
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-app
  namespace: default
spec:
  selector:
    app: nodejs-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
# =============================================================================
# Approach B: OTel Operator Auto-Injection
# =============================================================================

apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: nodejs-instrumentation
  namespace: default
spec:
  exporter:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "0.5"
  nodejs:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
    env:
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app-operator-otel
  namespace: default
  labels:
    app: nodejs-app-operator
    instrumentation: otel-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app-operator
  template:
    metadata:
      labels:
        app: nodejs-app-operator
      annotations:
        # -------------------------------------------------------------------
        # This annotation tells the OTel Operator to inject Node.js
        # auto-instrumentation into this pod.
        # -------------------------------------------------------------------
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      containers:
        - name: nodejs-app
          # No OTel packages needed in the image
          image: my-registry/my-nodejs-app:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "nodejs-app"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
