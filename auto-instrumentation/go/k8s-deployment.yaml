# =============================================================================
# Kubernetes Deployment for Go Application with OpenTelemetry
# =============================================================================
# Go does not support traditional auto-instrumentation. Two approaches:
#   (a) Manual SDK: OTel is compiled into the binary (see main.go).
#   (b) eBPF-based: OTel Operator attaches eBPF probes at runtime.
# =============================================================================

---
# =============================================================================
# Approach A: Manual SDK Instrumentation (compiled into the binary)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-manual-otel
  namespace: default
  labels:
    app: go-app
    instrumentation: manual-sdk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app
      instrumentation: manual-sdk
  template:
    metadata:
      labels:
        app: go-app
        instrumentation: manual-sdk
    spec:
      containers:
        - name: go-app
          image: my-registry/my-go-app:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "go-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default,service.version=1.0.0,k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME)"
            - name: DEPLOYMENT_ENVIRONMENT
              value: "production"
            - name: SERVICE_VERSION
              value: "1.0.0"
            # K8s metadata via Downward API
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: go-app
  namespace: default
spec:
  selector:
    app: go-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
# =============================================================================
# Approach B: eBPF-Based Auto-Instrumentation via OTel Operator
# =============================================================================
# This is EXPERIMENTAL. The OTel Operator uses eBPF to attach probes to the
# running Go binary, capturing traces from net/http, database/sql, and
# google.golang.org/grpc without any code changes.
#
# Prerequisites:
#   1. OpenTelemetry Operator installed with Go eBPF support
#   2. Linux kernel 4.19+ with BTF support
#   3. The Go binary must NOT be stripped (debug info required)
# =============================================================================

apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: go-instrumentation
  namespace: default
spec:
  exporter:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "0.5"
  go:
    image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:latest
    env:
      - name: OTEL_GO_AUTO_TARGET_EXE
        value: "/app/server"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-ebpf-otel
  namespace: default
  labels:
    app: go-app-ebpf
    instrumentation: otel-operator-ebpf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app-ebpf
  template:
    metadata:
      labels:
        app: go-app-ebpf
      annotations:
        # -------------------------------------------------------------------
        # Tells the OTel Operator to inject eBPF-based Go auto-instrumentation.
        # -------------------------------------------------------------------
        instrumentation.opentelemetry.io/inject-go: "true"
        # -------------------------------------------------------------------
        # REQUIRED: Path to the Go binary inside the container.
        # The eBPF agent needs to know which executable to attach to.
        # -------------------------------------------------------------------
        instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/app/server"
    spec:
      containers:
        - name: go-app
          # The image does NOT need OTel compiled in -- eBPF probes are
          # injected at runtime by the Operator's sidecar.
          # IMPORTANT: The binary must not be stripped (needs debug info).
          image: my-registry/my-go-app:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "go-app"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            # eBPF may require elevated privileges
            privileged: false
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
