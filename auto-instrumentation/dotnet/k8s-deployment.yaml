# =============================================================================
# Kubernetes Deployment for .NET Application with OpenTelemetry
# =============================================================================
# Uses the OTel Operator annotation for zero-code auto-instrumentation.
# =============================================================================

---
# =============================================================================
# Instrumentation CR for .NET
# =============================================================================
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: dotnet-instrumentation
  namespace: default
spec:
  exporter:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "0.5"
  dotnet:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:latest
    env:
      - name: OTEL_DOTNET_AUTO_LOGS_ENABLED
        value: "true"
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"

---
# =============================================================================
# Deployment with OTel Operator Annotation
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app-with-otel
  namespace: default
  labels:
    app: dotnet-app
    instrumentation: otel-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotnet-app
  template:
    metadata:
      labels:
        app: dotnet-app
      annotations:
        # -------------------------------------------------------------------
        # This annotation tells the OTel Operator to inject .NET
        # auto-instrumentation (CLR Profiler) into this pod.
        # The Operator sets CORECLR_ENABLE_PROFILING, CORECLR_PROFILER,
        # CORECLR_PROFILER_PATH, and related env vars automatically.
        # -------------------------------------------------------------------
        instrumentation.opentelemetry.io/inject-dotnet: "true"
    spec:
      containers:
        - name: dotnet-app
          # Image does NOT need OTel baked in -- Operator injects it
          image: my-registry/my-dotnet-app:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "dotnet-app"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default,service.version=1.0.0,k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME)"
            # K8s metadata via Downward API
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # ASP.NET Core configuration
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-app
  namespace: default
spec:
  selector:
    app: dotnet-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
# =============================================================================
# Alternative: Manual CLR Profiler (no Operator)
# =============================================================================
# If the OTel Operator is not available, you can use the Dockerfile with
# the profiler baked in. The deployment below shows the env vars you would
# need if the image already contains the profiler files at /opt/otel-dotnet.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app-manual-otel
  namespace: default
  labels:
    app: dotnet-app-manual
    instrumentation: manual-profiler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotnet-app-manual
  template:
    metadata:
      labels:
        app: dotnet-app-manual
    spec:
      containers:
        - name: dotnet-app
          image: my-registry/my-dotnet-app-with-otel:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # CLR Profiler (already in image)
            - name: CORECLR_ENABLE_PROFILING
              value: "1"
            - name: CORECLR_PROFILER
              value: "{918728DD-259F-4A6A-AC2B-B85E1B658318}"
            - name: CORECLR_PROFILER_PATH
              value: "/opt/otel-dotnet/linux-x64/OpenTelemetry.AutoInstrumentation.Native.so"
            - name: DOTNET_ADDITIONAL_DEPS
              value: "/opt/otel-dotnet/AdditionalDeps"
            - name: DOTNET_SHARED_STORE
              value: "/opt/otel-dotnet/store"
            - name: DOTNET_STARTUP_HOOKS
              value: "/opt/otel-dotnet/net/OpenTelemetry.AutoInstrumentation.StartupHook.dll"
            # OTel configuration
            - name: OTEL_SERVICE_NAME
              value: "dotnet-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=default,service.version=1.0.0"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_DOTNET_AUTO_LOGS_ENABLED
              value: "true"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
