# Kubernetes attributes processor - enriches telemetry with K8s metadata.
# Queries the K8s API server to resolve pod IP to pod/container metadata.
processors:
  k8sattributes:
    # How to associate incoming data with a pod (by connection IP)
    passthrough: false
    auth_type: "serviceAccount"

    # Filter pods to only the namespace(s) relevant to reduce API load
    filter:
      namespace: ${K8S_NAMESPACE:-""}

    # Extract these metadata fields from the K8s API
    extract:
      metadata:
        # Pod-level metadata
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.start_time
        # Workload metadata (deployment, statefulset, daemonset, job, cronjob)
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.job.name
        - k8s.cronjob.name
        # Container-level metadata
        - container.id
        - container.image.name
        - container.image.tag

      # Extract specific pod labels as resource attributes
      labels:
        - tag_name: app
          key: app.kubernetes.io/name
          from: pod
        - tag_name: app.version
          key: app.kubernetes.io/version
          from: pod
        - tag_name: app.component
          key: app.kubernetes.io/component
          from: pod

      # Extract specific pod annotations as resource attributes
      annotations:
        - tag_name: owner
          key: owner
          from: pod
        - tag_name: team
          key: team
          from: pod

    # Association rules to match incoming telemetry to pods
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection
