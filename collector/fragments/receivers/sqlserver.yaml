# SQL Server Receiver
# Pulls metrics from Microsoft SQL Server via performance counters and DMVs.
# Covers batch requests, transactions, lock waits, buffer cache, and connections.
#
# Supported: SQL Server 2012+ (on-prem and Azure SQL VM).
# For Azure SQL Database (PaaS), use the azuremonitor-sqldatabase.yaml fragment instead.
#
# Usage:
#   otelcol --config=base.yaml --config=sqlserver.yaml
receivers:
  sqlserver:
    # SQL Server connection string
    server: ${SQLSERVER_HOST:-localhost}
    port: ${SQLSERVER_PORT:-1433}
    username: ${SQLSERVER_USERNAME}
    password: ${SQLSERVER_PASSWORD}
    # Collection interval
    collection_interval: ${SQLSERVER_INTERVAL:-60s}
    metrics:
      sqlserver.batch.request.rate:
        enabled: true
      sqlserver.batch.sql_compilation.rate:
        enabled: true
      sqlserver.batch.sql_recompilation.rate:
        enabled: true
      sqlserver.lock.wait.rate:
        enabled: true
      sqlserver.lock.wait_time.avg:
        enabled: true
      sqlserver.page.buffer_cache.hit_ratio:
        enabled: true
      sqlserver.page.checkpoint.flush.rate:
        enabled: true
      sqlserver.page.lazy_write.rate:
        enabled: true
      sqlserver.page.life_expectancy:
        enabled: true
      sqlserver.page.operation.rate:
        enabled: true
      sqlserver.page.split.rate:
        enabled: true
      sqlserver.transaction.rate:
        enabled: true
      sqlserver.transaction.write.rate:
        enabled: true
      sqlserver.transaction_log.flush.data.rate:
        enabled: true
      sqlserver.transaction_log.flush.rate:
        enabled: true
      sqlserver.transaction_log.flush.wait.rate:
        enabled: true
      sqlserver.transaction_log.growth.count:
        enabled: true
      sqlserver.transaction_log.shrink.count:
        enabled: true
      sqlserver.transaction_log.percent_used:
        enabled: true
      sqlserver.user.connection.count:
        enabled: true
      sqlserver.processes.blocked:
        enabled: true
      sqlserver.database.io.read_latency:
        enabled: true
      sqlserver.database.io.write_latency:
        enabled: true
