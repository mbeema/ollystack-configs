# Traefik Receiver (via Prometheus scrape)
# Scrapes metrics from Traefik's built-in Prometheus endpoint.
# Traefik is a cloud-native edge router / ingress controller used in
# Kubernetes, Docker Swarm, and standalone environments.
#
# Covers: request rates, latency histograms, HTTP status codes per
# entrypoint/router/service, TLS certificates, open connections,
# retries, circuit breaker state, and configuration reloads.
#
# Enable metrics in Traefik:
#   --metrics.prometheus=true
#   --metrics.prometheus.entryPoint=metrics
#   --entrypoints.metrics.address=:8082
#
# Usage:
#   otelcol --config=base.yaml --config=traefik.yaml
receivers:
  prometheus/traefik:
    config:
      scrape_configs:
        - job_name: traefik
          scrape_interval: ${TRAEFIK_SCRAPE_INTERVAL:-15s}
          metrics_path: /metrics
          static_configs:
            - targets: ${TRAEFIK_TARGETS:-["localhost:8082"]}
              labels:
                component: ingress
          # Kubernetes: discover Traefik pods
          # kubernetes_sd_configs:
          #   - role: pod
          # relabel_configs:
          #   - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          #     action: keep
          #     regex: traefik
          #   - source_labels: [__meta_kubernetes_pod_container_port_name]
          #     action: keep
          #     regex: metrics
          metric_relabel_configs:
            - source_labels: [__name__]
              action: keep
              regex: "traefik_(entrypoint_requests_total|entrypoint_request_duration_seconds_bucket|entrypoint_request_duration_seconds_sum|entrypoint_request_duration_seconds_count|entrypoint_open_connections|entrypoint_requests_bytes_total|entrypoint_responses_bytes_total|router_requests_total|router_request_duration_seconds_bucket|service_requests_total|service_request_duration_seconds_bucket|service_open_connections|service_retries_total|service_server_up|tls_certs_not_after|config_reloads_total|config_reloads_failure_total)"
