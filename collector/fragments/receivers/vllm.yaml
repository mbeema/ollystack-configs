# vLLM Inference Server Receiver (via Prometheus scrape)
# Scrapes metrics from vLLM, the high-throughput LLM inference engine.
# Monitors token throughput, time-to-first-token, request latency,
# KV cache utilization, and GPU memory for production LLM deployments.
#
# vLLM is the most popular open-source LLM serving framework (2025),
# supporting PagedAttention, continuous batching, and prefix caching.
#
# Also compatible with: TGI (HuggingFace), TensorRT-LLM (NVIDIA),
# and Ollama — all expose Prometheus-compatible metrics.
#
# Enable metrics in vLLM:
#   python -m vllm.entrypoints.openai.api_server \
#     --model <model> --enable-metrics --metrics-port 8001
#
# Usage:
#   otelcol --config=base.yaml --config=vllm.yaml
receivers:
  prometheus/vllm:
    config:
      scrape_configs:
        - job_name: vllm
          scrape_interval: ${VLLM_SCRAPE_INTERVAL:-15s}
          metrics_path: /metrics
          static_configs:
            - targets: ${VLLM_TARGETS:-["localhost:8001"]}
              labels:
                component: llm-inference
                ai.model.provider: vllm
          # Kubernetes: discover vLLM pods
          # kubernetes_sd_configs:
          #   - role: pod
          # relabel_configs:
          #   - source_labels: [__meta_kubernetes_pod_label_app]
          #     action: keep
          #     regex: vllm
          #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
          #     action: replace
          #     target_label: __address__
          #     regex: (.+)
          #     replacement: ${1}:8001
          metric_relabel_configs:
            - source_labels: [__name__]
              action: keep
              regex: "vllm:(prompt_tokens_total|generation_tokens_total|request_success_total|request_failure_total|time_to_first_token_seconds_bucket|time_to_first_token_seconds_sum|time_to_first_token_seconds_count|time_per_output_token_seconds_bucket|time_per_output_token_seconds_sum|time_per_output_token_seconds_count|e2e_request_latency_seconds_bucket|e2e_request_latency_seconds_sum|e2e_request_latency_seconds_count|num_requests_running|num_requests_waiting|num_requests_swapped|gpu_cache_usage_perc|cpu_cache_usage_perc|num_preemptions_total|avg_prompt_throughput_toks_per_s|avg_generation_throughput_toks_per_s|request_prompt_tokens_bucket|request_generation_tokens_bucket|cache_hit_rate)"
