# Azure Monitor Receiver — Service Bus
# Pulls metrics from Azure Service Bus queues, topics, and namespaces.
# Covers message counts, active connections, throttled requests, and server errors.
#
# Required: Azure AD credentials with Monitoring Reader role.
#
# Usage:
#   otelcol --config=base.yaml --config=azuremonitor-servicebus.yaml
receivers:
  azuremonitor/servicebus:
    tenant_id: ${AZURE_TENANT_ID}
    client_id: ${AZURE_CLIENT_ID}
    client_secret: ${AZURE_CLIENT_SECRET}
    subscription_id: ${AZURE_SUBSCRIPTION_ID}
    cloud: ${AZURE_CLOUD:-AzureCloud}
    collection_interval: ${AZURE_MONITOR_INTERVAL:-60s}
    resource_groups:
      - name: ${AZURE_RESOURCE_GROUP}
        resources:
          - resource_type: Microsoft.ServiceBus/namespaces
            metrics:
              # --- Message Counts ---
              - name: IncomingMessages
              - name: OutgoingMessages
              - name: Messages
              - name: ActiveMessages
              - name: DeadletteredMessages
              - name: ScheduledMessages
              - name: CompleteMessage
              - name: AbandonMessage

              # --- Connections ---
              - name: ActiveConnections
              - name: ConnectionsOpened
              - name: ConnectionsClosed

              # --- Request Handling ---
              - name: IncomingRequests
              - name: SuccessfulRequests
              - name: ThrottledRequests
              - name: ServerErrors
              - name: UserErrors
              - name: ServerSendLatency

              # --- Resource Usage ---
              - name: Size
              - name: NamespaceCpuUsage
              - name: NamespaceMemoryUsage

              # --- Pending Checkpoint (Event Processor) ---
              - name: PendingCheckpointOperationCount
