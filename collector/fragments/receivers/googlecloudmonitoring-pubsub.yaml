# Google Cloud Monitoring Receiver — Pub/Sub
# Pulls Pub/Sub topic, subscription, and snapshot metrics from Google Cloud Monitoring.
# Covers message throughput, backlog, oldest unacked message age, and push delivery.
#
# Note: This receiver pulls METRICS about Pub/Sub performance.
# The separate googlecloudpubsub receiver (googlecloudpubsub.yaml) consumes
# DATA from Pub/Sub subscriptions. Use both together for complete coverage.
#
# Required IAM role: roles/monitoring.viewer
#
# Required environment variables:
#   GCP_PROJECT_ID  - Google Cloud project ID
#
# Usage:
#   otelcol --config=base.yaml --config=googlecloudmonitoring-pubsub.yaml
receivers:
  googlecloudmonitoring/pubsub:
    project_id: ${GCP_PROJECT_ID}
    collection_interval: ${GCP_MONITORING_INTERVAL:-60s}
    metrics_list:
      # --- Topic Metrics ---
      - metric_name: pubsub.googleapis.com/topic/send_message_operation_count
      - metric_name: pubsub.googleapis.com/topic/send_request_count
      - metric_name: pubsub.googleapis.com/topic/byte_cost
      - metric_name: pubsub.googleapis.com/topic/message_sizes
      - metric_name: pubsub.googleapis.com/topic/num_retained_acked_messages_by_region
      - metric_name: pubsub.googleapis.com/topic/num_unacked_messages_by_region
      - metric_name: pubsub.googleapis.com/topic/oldest_retained_acked_message_age_by_region
      - metric_name: pubsub.googleapis.com/topic/oldest_unacked_message_age_by_region

      # --- Subscription Metrics ---
      - metric_name: pubsub.googleapis.com/subscription/pull_request_count
      - metric_name: pubsub.googleapis.com/subscription/pull_message_operation_count
      - metric_name: pubsub.googleapis.com/subscription/streaming_pull_response_count
      - metric_name: pubsub.googleapis.com/subscription/streaming_pull_message_operation_count
      - metric_name: pubsub.googleapis.com/subscription/push_request_count
      - metric_name: pubsub.googleapis.com/subscription/push_request_latencies

      # --- Backlog (critical for consumer lag alerting) ---
      - metric_name: pubsub.googleapis.com/subscription/num_undelivered_messages
      - metric_name: pubsub.googleapis.com/subscription/oldest_unacked_message_age
      - metric_name: pubsub.googleapis.com/subscription/backlog_bytes
      - metric_name: pubsub.googleapis.com/subscription/num_outstanding_messages

      # --- Acknowledgement ---
      - metric_name: pubsub.googleapis.com/subscription/ack_message_count
      - metric_name: pubsub.googleapis.com/subscription/mod_ack_deadline_message_operation_count
      - metric_name: pubsub.googleapis.com/subscription/expired_ack_deadlines_count
      - metric_name: pubsub.googleapis.com/subscription/dead_letter_message_count

      # --- Delivery ---
      - metric_name: pubsub.googleapis.com/subscription/sent_message_count
      - metric_name: pubsub.googleapis.com/subscription/byte_cost
      - metric_name: pubsub.googleapis.com/subscription/message_sizes

      # --- Seek ---
      - metric_name: pubsub.googleapis.com/subscription/seek_request_count

      # --- Snapshot ---
      - metric_name: pubsub.googleapis.com/snapshot/num_messages
      - metric_name: pubsub.googleapis.com/snapshot/oldest_message_age
      - metric_name: pubsub.googleapis.com/snapshot/backlog_bytes
