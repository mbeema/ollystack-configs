# OpenSearch Exporter
# Exports traces and logs to OpenSearch (AWS OpenSearch Service or self-hosted).
# Compatible with Amazon OpenSearch Serverless and managed OpenSearch.
#
# Usage:
#   otelcol --config=base.yaml --config=opensearch.yaml
exporters:
  opensearch:
    http:
      endpoint: ${OPENSEARCH_ENDPOINT:-https://localhost:9200}
      # Authentication (basic auth, SigV4 for AWS, or API key)
      # auth:
      #   authenticator: sigv4auth
    traces_index: ${OPENSEARCH_TRACES_INDEX:-otel-traces}
    logs_index: ${OPENSEARCH_LOGS_INDEX:-otel-logs}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
