# Logz.io Exporter
# Exports traces, metrics, and logs to Logz.io.
# Uses Logz.io's OTLP-compatible endpoints.
#
# Required: Logz.io shipping token from Settings > Manage Tokens.
#
# Usage:
#   otelcol --config=base.yaml --config=logzio.yaml
exporters:
  logzio:
    account_token: ${LOGZIO_TOKEN}
    # Region endpoint (us, eu, au, ca, uk)
    region: ${LOGZIO_REGION:-us}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
