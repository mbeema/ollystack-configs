# Loki Exporter
# Exports logs to Grafana Loki using the Loki push API.
# Loki is a horizontally scalable, highly available log aggregation system
# designed for cost-effective log storage and querying via LogQL.
#
# Supports: logs
#
# Required env vars:
#   LOKI_ENDPOINT - Loki server URL (default: http://loki:3100)
#
# Optional env vars:
#   LOKI_TENANT_ID - Multi-tenancy tenant ID (leave empty for single-tenant)
#
# Usage:
#   otelcol --config=base.yaml --config=loki.yaml
exporters:
  loki:
    endpoint: ${LOKI_ENDPOINT:-http://loki:3100}/loki/api/v1/push
    tenant_id: ${LOKI_TENANT_ID:-""}
    # Labels derived from resource attributes — these become Loki stream labels
    labels:
      attributes:
        service.name: ""
        k8s.namespace.name: ""
        k8s.pod.name: ""
      resource:
        service.name: "service_name"
        k8s.namespace.name: "namespace"
        k8s.pod.name: "pod"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
