# InfluxDB Exporter
# Exports metrics to InfluxDB v1 or v2 (including InfluxDB Cloud).
# Converts OTel metrics to InfluxDB line protocol format.
#
# Usage:
#   otelcol --config=base.yaml --config=influxdb.yaml
exporters:
  influxdb:
    endpoint: ${INFLUXDB_ENDPOINT:-http://localhost:8086}
    # InfluxDB v2 token authentication
    token: ${INFLUXDB_TOKEN}
    org: ${INFLUXDB_ORG}
    bucket: ${INFLUXDB_BUCKET:-otel}
    # InfluxDB v1 (use these instead of token/org/bucket)
    # username: ${INFLUXDB_USERNAME}
    # password: ${INFLUXDB_PASSWORD}
    # database: ${INFLUXDB_DATABASE:-otel}
    metrics_schema: telegraf-prometheus-v2
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
