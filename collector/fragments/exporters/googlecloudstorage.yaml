# Google Cloud Storage Exporter
# Exports traces, metrics, and logs to GCS buckets.
# Useful for long-term archival, data lake ingestion, and compliance storage.
# Authenticates via Application Default Credentials or Workload Identity.
#
# Supports: traces, metrics, logs
#
# Required env vars:
#   GCS_BUCKET - GCS bucket name
#
# Optional env vars:
#   GCS_PREFIX - Object key prefix (default: telemetry/)
#
# Usage:
#   otelcol --config=base.yaml --config=googlecloudstorage.yaml
exporters:
  googlecloudstorage:
    bucket: ${GCS_BUCKET}
    prefix: ${GCS_PREFIX:-telemetry/}
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
