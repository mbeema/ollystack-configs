# =============================================================================
# OpenTelemetry Collector Builder (OCB) Manifest
# =============================================================================
# This manifest defines a custom OpenTelemetry Collector distribution built
# using the OpenTelemetry Collector Builder (ocb). It includes a comprehensive
# set of contrib receivers, processors, exporters, extensions, and connectors
# suitable for production observability pipelines.
#
# Build:
#   ocb --config manifest.yaml
#
# The resulting binary is a single statically-linked collector that includes
# only the components listed here, keeping the binary size manageable while
# covering the most common production use cases.
#
# Component count: 84 receivers, 42 exporters, 21 processors, 17 extensions, 6 connectors
# =============================================================================

dist:
  name: ollystack-collector
  description: "OllyStack Custom OpenTelemetry Collector Distribution"
  output_path: ${OTEL_COLLECTOR_BUILD_DIR:-./build}
  otelcol_version: ${OTEL_COLLECTOR_VERSION:-0.115.0}
  module: github.com/ollystack/otel-collector

# =============================================================================
# Receivers (84)
# =============================================================================
# Receivers define how telemetry data enters the collector. This set covers
# protocol receivers (OTLP, Jaeger, Zipkin), infrastructure receivers
# (hostmetrics, kubeletstats, docker), application receivers (prometheus,
# statsd, filelog), cloud receivers (AWS, Azure, GCP), database receivers,
# web/app servers, messaging, SaaS integrations, and network receivers.
# =============================================================================
receivers:
  # --- Protocol Receivers ---
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.115.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/jaegerreceiver v0.115.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/zipkinreceiver v0.115.0
