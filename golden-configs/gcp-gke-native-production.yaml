# ============================================================================
# OllyStack Golden Config: GCP GKE + Cloud Operations (Production)
# ============================================================================
# Platform:     GCP GKE
# Backend:      GCP Cloud Operations (Cloud Trace, Cloud Monitoring, Cloud Logging)
# Environment:  Production
# Cost Profile: Aggressive (~60-80% volume reduction)
# Signals:      Traces + Metrics + Logs
#
# Prerequisites:
#   - GCP_PROJECT_ID              : GCP project ID for Cloud Operations
#   - GOOGLE_APPLICATION_CREDENTIALS : Path to service account key JSON
#                                      (not needed with Workload Identity)
#   - K8S_NODE_NAME               : Kubernetes node name (set via downward API)
#
# Authentication:
#   Preferred: GKE Workload Identity (no credentials file needed)
#   Fallback:  Service account key via GOOGLE_APPLICATION_CREDENTIALS
#
# Deploy:
#   otelcol --config golden-configs/gcp-gke-native-production.yaml
# ============================================================================

# ── Receivers ──────────────────────────────────────────────────────────────
# Ingest telemetry from applications and infrastructure
receivers:
  # OpenTelemetry Protocol - primary application telemetry ingestion
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host-level metrics from the underlying GCE instances
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      network: {}
      filesystem: {}
      load: {}

  # Kubernetes cluster-level metrics (deployments, nodes, pods)
  k8s_cluster:
    collection_interval: 30s
    node_conditions_to_report: [Ready, MemoryPressure, DiskPressure]
    allocatable_types_to_report: [cpu, memory]

  # Kubelet stats for container/pod/node resource usage
  kubeletstats:
    collection_interval: 30s
    auth_type: serviceAccount
    endpoint: "https://${env:K8S_NODE_NAME}:10250"
    insecure_skip_verify: true
    metric_groups: [container, pod, node]

# ── Processors ─────────────────────────────────────────────────────────────
# Order: memory_limiter (first) -> enrichment -> filtering -> sampling -> redaction -> batch (last)
processors:
  # Back-pressure safety valve - MUST be first processor in every pipeline
  # Prevents OOM kills by refusing data when memory usage is high
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Detect GCP resource attributes automatically (project, zone, GKE cluster)
  resourcedetection/gcp:
    detectors: [env, gcp]
    timeout: 5s
    override: false

  # Enrich telemetry with Kubernetes metadata (pod name, namespace, labels)
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
      labels:
        - tag_name: app
          key: app
          from: pod
        - tag_name: version
          key: version
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  # Drop logs below WARN severity - production only needs warnings and errors
  # This is the single biggest cost reduction lever for logs (~50-70% reduction)
  # GCP Cloud Logging pricing is per-volume, so this directly reduces costs
  filter/logs-severity:
    logs:
      log_record:
        - severity_number < SEVERITY_NUMBER_WARN

  # Drop health/readiness/liveness probe logs that are not warnings or errors
  filter/logs:
    logs:
      log_record:
        - IsMatch(body, ".*health.*") and severity_number < SEVERITY_NUMBER_WARN
        - IsMatch(body, ".*readiness.*") and severity_number < SEVERITY_NUMBER_WARN
        - IsMatch(body, ".*liveness.*") and severity_number < SEVERITY_NUMBER_WARN

  # Drop traces for health check and infrastructure endpoints
  filter/traces:
    traces:
      span:
        - attributes["http.route"] == "/health"
        - attributes["http.route"] == "/healthz"
        - attributes["http.route"] == "/ready"
        - attributes["http.route"] == "/readyz"
        - attributes["http.route"] == "/livez"
        - attributes["http.route"] == "/metrics"

  # Drop traces for noisy static asset requests and CORS preflight
  filter/traces-noisy:
    traces:
      span:
        - attributes["http.route"] == "/favicon.ico"
        - attributes["http.method"] == "OPTIONS"
        - IsMatch(attributes["http.route"], ".*\\.(css|js|png|jpg|gif|svg|ico|woff|woff2)$")

  # Strip high-cardinality span attributes to reduce Cloud Trace storage costs
  # Truncate remaining attributes to 1KB max
  transform/traces-cost:
    trace_statements:
      - context: span
        statements:
          - delete_key(attributes, "http.request.header.user-agent")
          - delete_key(attributes, "http.request.header.cookie")
          - truncate_all(attributes, 1024)

  # Drop noisy/low-value metrics to reduce Cloud Monitoring cardinality
  # GCP charges per time-series, so cardinality reduction is critical
  filter/metrics-cardinality:
    metrics:
      metric:
        - name == "process.runtime.cpython.gc_count"

  # Tail-based sampling: keep errors, slow traces, and 10% of everything else
  # Cloud Trace pricing is per-span, so sampling directly reduces costs
  tail_sampling/composite:
    decision_wait: 10s
    num_traces: 100000
    policies:
      # Always keep error traces - these are the most valuable for debugging
      - name: errors
        type: status_code
        status_code: {status_codes: [ERROR]}
      # Always keep slow traces (>2s) - potential performance issues
      - name: slow-traces
        type: latency
        latency: {threshold_ms: 2000}
      # Sample 10% of remaining normal traces for baseline visibility
      - name: probabilistic-catchall
        type: probabilistic
        probabilistic: {sampling_percentage: 10}

  # Redact PII patterns (SSN, credit cards, emails) from all telemetry
  # Critical for GCP compliance - data in Cloud Operations may be subject to audits
  redaction:
    allow_all_keys: true
    blocked_values:
      - "\\b[0-9]{3}-[0-9]{2}-[0-9]{4}\\b"                              # SSN
      - "\\b[0-9]{16}\\b"                                                 # Credit card (simple)
      - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"        # Email

  # Batch telemetry for efficient network usage - MUST be last processor
  batch:
    send_batch_size: 8192
    timeout: 5s
    send_batch_max_size: 16384

# ── Exporters ──────────────────────────────────────────────────────────────
exporters:
  # GCP Cloud Operations exporter - sends to Cloud Trace, Cloud Monitoring, Cloud Logging
  # Uses the googlecloud exporter which handles all three signals natively
  # Authentication: Workload Identity (preferred) or GOOGLE_APPLICATION_CREDENTIALS
  googlecloud:
    project: ${GCP_PROJECT_ID}

# ── Extensions ─────────────────────────────────────────────────────────────
extensions:
  # Health check endpoint for Kubernetes liveness/readiness probes
  health_check:
    endpoint: 0.0.0.0:13133

  # Performance profiling endpoint (disable in locked-down environments)
  pprof:
    endpoint: 0.0.0.0:1777

  # Debug pages for pipeline visualization
  zpages:
    endpoint: 0.0.0.0:55679

# ── Service ────────────────────────────────────────────────────────────────
service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/gcp   # 2. GCP resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/traces           # 4. Drop health check spans
        - filter/traces-noisy     # 5. Drop static asset spans
        - transform/traces-cost   # 6. Strip high-cardinality attributes
        - tail_sampling/composite # 7. Keep errors + slow + 10% sample
        - redaction               # 8. Scrub PII
        - batch                   # 9. Batch for export (always last)
      exporters: [googlecloud]
    metrics:
      receivers: [otlp, hostmetrics, k8s_cluster, kubeletstats]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/gcp   # 2. GCP resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/metrics-cardinality # 4. Drop noisy metrics
        - redaction               # 5. Scrub PII
        - batch                   # 6. Batch for export (always last)
      exporters: [googlecloud]
    logs:
      receivers: [otlp]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/gcp   # 2. GCP resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/logs-severity    # 4. Drop below WARN severity
        - filter/logs             # 5. Drop health check logs
        - redaction               # 6. Scrub PII
        - batch                   # 7. Batch for export (always last)
      exporters: [googlecloud]
