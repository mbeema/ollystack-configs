# ============================================================================
# OllyStack Golden Config: AWS EKS + Grafana Cloud (Staging)
# ============================================================================
# Platform:     AWS EKS
# Backend:      Grafana Cloud
# Environment:  Staging
# Cost Profile: Balanced (~30-50% volume reduction)
# Signals:      Traces + Metrics + Logs
#
# Prerequisites:
#   - GRAFANA_CLOUD_INSTANCE : Grafana Cloud stack instance name
#   - GRAFANA_CLOUD_API_KEY  : Base64-encoded instanceID:API-key
#   - K8S_NODE_NAME          : Kubernetes node name (set via downward API)
#
# Deploy:
#   otelcol --config golden-configs/aws-grafana-cloud-staging.yaml
# ============================================================================

# ── Receivers ──────────────────────────────────────────────────────────────
# Ingest telemetry from applications and infrastructure
receivers:
  # OpenTelemetry Protocol - primary application telemetry ingestion
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host-level metrics from the underlying EC2 instances
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      network: {}
      filesystem: {}
      load: {}

  # Kubernetes cluster-level metrics (deployments, nodes, pods)
  k8s_cluster:
    collection_interval: 30s
    node_conditions_to_report: [Ready, MemoryPressure, DiskPressure]
    allocatable_types_to_report: [cpu, memory]

  # Kubelet stats for container/pod/node resource usage
  kubeletstats:
    collection_interval: 30s
    auth_type: serviceAccount
    endpoint: "https://${env:K8S_NODE_NAME}:10250"
    insecure_skip_verify: true
    metric_groups: [container, pod, node]

# ── Processors ─────────────────────────────────────────────────────────────
# Order: memory_limiter (first) -> enrichment -> filtering -> sampling -> batch (last)
# Staging profile: more permissive than production for debugging
processors:
  # Back-pressure safety valve - MUST be first processor in every pipeline
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Detect AWS resource attributes automatically (region, instance ID, EKS cluster)
  resourcedetection/aws:
    detectors: [env, ec2, ecs, eks]
    timeout: 5s
    override: false

  # Enrich telemetry with Kubernetes metadata (pod name, namespace, labels)
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
      labels:
        - tag_name: app
          key: app
          from: pod
        - tag_name: version
          key: version
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  # Drop logs below INFO severity - staging keeps INFO for debugging
  # Less aggressive than production (WARN+) to aid development troubleshooting
  filter/logs-severity:
    logs:
      log_record:
        - severity_number < SEVERITY_NUMBER_INFO

  # Drop health/readiness/liveness probe logs that are not warnings or errors
  filter/logs:
    logs:
      log_record:
        - IsMatch(body, ".*health.*") and severity_number < SEVERITY_NUMBER_WARN
        - IsMatch(body, ".*readiness.*") and severity_number < SEVERITY_NUMBER_WARN
        - IsMatch(body, ".*liveness.*") and severity_number < SEVERITY_NUMBER_WARN

  # Drop traces for health check and infrastructure endpoints
  filter/traces:
    traces:
      span:
        - attributes["http.route"] == "/health"
        - attributes["http.route"] == "/healthz"
        - attributes["http.route"] == "/ready"
        - attributes["http.route"] == "/readyz"
        - attributes["http.route"] == "/livez"
        - attributes["http.route"] == "/metrics"

  # Drop traces for noisy static asset requests and CORS preflight
  filter/traces-noisy:
    traces:
      span:
        - attributes["http.route"] == "/favicon.ico"
        - attributes["http.method"] == "OPTIONS"
        - IsMatch(attributes["http.route"], ".*\\.(css|js|png|jpg|gif|svg|ico|woff|woff2)$")

  # Drop noisy/low-value metrics to reduce cardinality
  filter/metrics-cardinality:
    metrics:
      metric:
        - name == "process.runtime.cpython.gc_count"

  # Head-based probabilistic sampling at 50% for staging
  # Simpler than tail sampling - good enough for non-production environments
  # Keeps costs manageable while retaining broad visibility
  probabilistic_sampler:
    sampling_percentage: 50

  # Batch telemetry for efficient network usage - MUST be last processor
  batch:
    send_batch_size: 8192
    timeout: 5s
    send_batch_max_size: 16384

# ── Exporters ──────────────────────────────────────────────────────────────
exporters:
  # Grafana Cloud OTLP endpoint - single endpoint for all signals
  # Authorization uses Base64-encoded instanceID:API-key
  otlphttp/grafana:
    endpoint: https://${GRAFANA_CLOUD_INSTANCE}.grafana.net/otlp
    headers:
      Authorization: "Basic ${GRAFANA_CLOUD_API_KEY}"

# ── Extensions ─────────────────────────────────────────────────────────────
extensions:
  # Health check endpoint for Kubernetes liveness/readiness probes
  health_check:
    endpoint: 0.0.0.0:13133

  # Performance profiling endpoint
  pprof:
    endpoint: 0.0.0.0:1777

  # Debug pages for pipeline visualization
  zpages:
    endpoint: 0.0.0.0:55679

# ── Service ────────────────────────────────────────────────────────────────
service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/aws   # 2. AWS resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/traces           # 4. Drop health check spans
        - filter/traces-noisy     # 5. Drop static asset spans
        - probabilistic_sampler   # 6. 50% head sampling for staging
        - batch                   # 7. Batch for export (always last)
      exporters: [otlphttp/grafana]
    metrics:
      receivers: [otlp, hostmetrics, k8s_cluster, kubeletstats]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/aws   # 2. AWS resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/metrics-cardinality # 4. Drop noisy metrics
        - batch                   # 5. Batch for export (always last)
      exporters: [otlphttp/grafana]
    logs:
      receivers: [otlp]
      processors:
        - memory_limiter          # 1. Back-pressure protection
        - resourcedetection/aws   # 2. AWS resource enrichment
        - k8sattributes           # 3. Kubernetes metadata enrichment
        - filter/logs-severity    # 4. Drop below INFO severity
        - filter/logs             # 5. Drop health check logs
        - batch                   # 6. Batch for export (always last)
      exporters: [otlphttp/grafana]
